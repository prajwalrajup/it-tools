      placeholder-number-of-disks-per-stripe-ex-3: "스트라이프당 디스크 수(예: 3)"
      label-raid-type: RAID 유형
      title-results: 결과
      tag-for-more-information-on-raid-types-see: RAID 유형에 대한 자세한 내용은 다음을 참조하세요.
      tag-wikipedia: 위키피디아
      tag-: .
      tag-capacity: 용량
      tag-fault-tolerance: 내결함성
      tag-space-efficiency: 공간 효율성
    text:
      num-1-drive-failures: "{0} 드라이브 오류"
    service:
      text:
        3-drive-failures-per-raid-7-set: RAID 7 세트당 3개의 드라이브 오류
        raid-70-requires-at-least-10-disks-with-5-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          RAID 70에는 스트라이프당 최소 5개씩, 총 10개의 디스크가 필요합니다. 각 스트라이프에는 동일한 수의 디스크가
          포함되어야 합니다.
        raid-70-stripes-multiple-raid-7-arrays-together-raid-7-raid-0-each-raid-7-set-can-sustain-three-drive-failures:
          RAID 70은 여러 개의 RAID 7 어레이를 함께 스트라이핑합니다(RAID 7 + RAID 0). 각 RAID 7 세트는
          최대 3개의 드라이브 장애를 견딜 수 있습니다.
        2-drive-failures-per-raid-6-set: RAID 6 세트당 2개의 드라이브 오류
        raid-60-requires-at-least-8-disks-with-4-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          RAID 60에는 최소 8개의 디스크가 필요하며, 스트라이프당 최소 4개가 필요합니다. 스트라이프는 동일한 수의 디스크를
          포함해야 합니다.
        raid-60-stripes-multiple-raid-6-arrays-together-raid-6-raid-0-each-raid-6-set-can-sustain-two-drive-failures:
          RAID 60은 여러 개의 RAID 6 어레이를 함께 스트라이핑합니다(RAID 6 + RAID 0). 각 RAID 6 세트는
          두 개의 드라이브 장애를 견딜 수 있습니다.
        1-drive-failure-per-raid-5-set: RAID 5 세트당 1개의 드라이브 오류
        raid-50-requires-at-least-6-disks-with-3-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          RAID 50에는 스트라이프당 최소 3개씩, 총 6개의 디스크가 필요합니다. 각 스트라이프에는 동일한 수의 디스크가 포함되어야
          합니다.
        raid-50-stripes-multiple-raid-5-arrays-together-raid-5-raid-0-each-raid-5-set-can-sustain-a-single-drive-failure:
          RAID 50은 여러 개의 RAID 5 어레이를 함께 스트라이핑합니다(RAID 5 + RAID 0). 각 RAID 5 세트는
          단일 드라이브 장애를 견딜 수 있습니다.
        1-drive-failure-per-mirrored-set: 미러링된 세트당 1개의 드라이브 오류
        raid-10-requires-an-even-number-of-at-least-4-disks: RAID 10에는 최소 4개 이상의 짝수 개의 디스크가 필요합니다.
        raid-10-is-a-stripe-of-mirrors-raid-1-raid-0-each-set-of-drives-is-mirrored-and-striped-together-so-that-each-drive-in-the-set-is-fault-tolerant-within-the-group:
          RAID 10은 미러링 스트라이프(RAID 1 + RAID 0)입니다. 각 드라이브 세트는 미러링되고 함께 스트라이프되어 세트
          내 각 드라이브가 그룹 내에서 내결함성을 갖도록 합니다.
        3-drive-failures: 3개의 드라이브 오류
        raid-7-requires-at-least-5-disks: RAID 7에는 최소 5개의 디스크가 필요합니다.
        raid-7-raid-tp-non-standard-is-similiar-to-raid-5-and-raid-6-but-with-a-third-parity-block-this-allows-for-a-third-disk-failure-at-the-cost-of-storage-reduction-equal-to-three-drives:
          RAID 7/RAID TP(비표준)는 RAID 5 및 RAID 6과 유사하지만 세 번째 패리티 블록이 있습니다. 이 구성은 세
          번째 디스크 장애 발생 시 세 개의 드라이브에 해당하는 저장 공간 감소를 감수해야 합니다.
        2-drive-failures: 2개의 드라이브 오류
        raid-6-requires-at-least-4-disks: RAID 6에는 최소 4개의 디스크가 필요합니다.
        raid-6-is-similiar-to-raid-5-but-with-an-additional-parity-block-this-allows-for-an-additional-disk-failure-at-the-cost-of-storage-reduction-equal-to-two-drives:
          RAID 6는 RAID 5와 유사하지만 패리티 블록이 하나 더 있습니다. 따라서 디스크 장애가 하나 더 발생하더라도 두 개의
          드라이브에 해당하는 저장 공간이 감소합니다.
        1-drive-failure: 1개 드라이브 오류
        raid-5-requires-at-least-3-disks: RAID 5에는 최소 3개의 디스크가 필요합니다.
        raid-5-uses-block-level-striping-with-parity-this-allows-for-fault-tolerance-with-a-storage-reduction-equal-to-one-drive-for-the-parity-information:
          RAID 5는 패리티를 포함한 블록 레벨 스트라이핑을 사용합니다. 이를 통해 패리티 정보를 위한 드라이브 하나만큼의 저장
          공간이 감소하여 장애 복구가 가능합니다.
        raid-1-requires-at-least-1-disk: RAID 1에는 최소 1개의 디스크가 필요합니다.
        raid-1-consists-of-an-exact-copy-of-the-data-mirror-across-two-or-more-disks-the-array-will-operate-as-long-as-at-least-one-drive-is-operational:
          RAID 1은 두 개 이상의 디스크에 데이터를 정확히 복사(미러링)하는 방식으로 구성됩니다. 최소 하나의 드라이브가 작동하는
          한 어레이는 계속 작동합니다.
        raid-0-requires-at-least-1-disk: RAID 0에는 최소 1개의 디스크가 필요합니다.
        raid-0-splits-data-evenly-across-2-or-more-disks-without-redunancy-or-fault-tolerance-creating-one-large-storage-space: RAID 0은 중복성이나 장애 허용성 없이 2개 이상의 디스크에 데이터를 균등하게 분할하여 하나의 큰 저장 공간을 만듭니다.
