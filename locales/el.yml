      title-generated-tcpdump-command: Δημιουργήθηκε εντολή tcpdump
      tag-tcpdump-is-a-utility-commonly-installed-available-to-many-linux-distributions-to-quickly-gather-a-network-trace-packet-capture-in-short-it-s-the-wireshark-of-linux-to-gathering-packet-captures-tcpdump-is-very-versatile-with-many-switches-to-granularly-capture-what-you-need-to-dubug-network-traffic-with-options-to-output-results-via-console-file-or-wireshark-pcap:
        Το tcpdump είναι ένα βοηθητικό πρόγραμμα που εγκαθίσταται/διατίθεται
        συνήθως σε πολλές διανομές Linux για τη γρήγορη συλλογή ιχνών δικτύου /
        καταγραφής πακέτων. Με λίγα λόγια, είναι το Wireshark του Linux στη
        συλλογή καταγραφών πακέτων. Το tcpdump είναι πολύ ευέλικτο με πολλούς
        διακόπτες για την λεπτομερή καταγραφή ό,τι χρειάζεστε για την αντιγραφή
        σφαλμάτων στην κυκλοφορία δικτύου, με επιλογές για την εξαγωγή
        αποτελεσμάτων μέσω κονσόλας, αρχείου ή Wireshark pcap.
      tag-this-utility-is-to-help-generate-a-tcpdump-command-using-some-of-the-more-common-switches-filters-offered-by-the-tcpdump-this-utility-is-not-encompassing-of-all-options-tcpdump-offers-a-complete-list-of-options-can-be-found-via-its-manual-nbsp:
        "Αυτό το βοηθητικό πρόγραμμα έχει ως στόχο να βοηθήσει στη δημιουργία
        μιας εντολής tcpdump χρησιμοποιώντας μερικούς από τους πιο συνηθισμένους
        διακόπτες/φίλτρα που προσφέρει το tcpdump. Αυτό το βοηθητικό πρόγραμμα
        δεν περιλαμβάνει όλες τις επιλογές που προσφέρει το tcpdump. Μια πλήρης
        λίστα επιλογών μπορεί να βρεθεί στο εγχειρίδιό του:"
      tag-https-www-tcpdump-org-manpages-tcpdump-1-html: https://www.tcpdump.org/manpages/tcpdump.1.html
      tag-note: "Σημείωμα:"
      tag-nbsp-host-source-host-and-destination-host-can-take-multiple-entries-separate-your-entries-with-a-comma-space-or-semicolon:
        Οι κεντρικοί υπολογιστές, οι κεντρικοί υπολογιστές προέλευσης και οι
        κεντρικοί υπολογιστές προορισμού μπορούν να δεχθούν πολλαπλές
        καταχωρήσεις. Διαχωρίστε τις καταχωρίσεις σας με κόμμα, κενό ή
        ερωτηματικό.
      tag-note-2: "Σημείωση 2:"
      tag-nbsp-when-you-specify-a-source-src-or-destination-dst-flags-tcpdump-will-only-filter-in-that-direction-if-you-are-looking-to-capture-full-tcp-handshake-make-sure-you-use-host-vs-src-host-or-dst-host-to-see-both-request-and-response-flow:
        Όταν καθορίζετε σημαίες προέλευσης (src) ή προορισμού (dst), το tcpdump
        θα φιλτράρει μόνο προς αυτήν την κατεύθυνση. Εάν θέλετε να καταγράψετε
        πλήρη χειραψία TCP, βεβαιωθείτε ότι χρησιμοποιείτε "host" έναντι "src
        host" ή "dst host" για να δείτε τη ροή αιτήματος και απόκρισης.
      tag-the-network-interface-to-capture-packets-from: Η διεπαφή δικτύου από την οποία θα συλλέγονται πακέτα.
