  content-fork: >
    # حول أدوات تكنولوجيا المعلومات

    هذا الموقع الرائع، الذي أنشأه بكل حب [كورنتين
    توماسيت](https://corentin.tech?utm_source=it-tools&utm_medium=about) ووسّعه
    ShareVB، يجمع أدوات مفيدة للمطورين والعاملين في مجال تكنولوجيا المعلومات.
    إذا وجدته مفيدًا، فلا تتردد في مشاركته مع من تعتقد أنه قد يفيدك أيضًا، ولا
    تنسَ حفظه في شريط الاختصارات!

    أدوات تكنولوجيا المعلومات مفتوحة المصدر (تحت رخصة GPL-3.0) ومجانية، وستظل
    كذلك دائمًا. إذا كنت ترغب في دعم عملي على هذه النسخة، وتشجيعي على إضافة
    المزيد من الأدوات أو الوظائف، ففكر في دعمي من خلال
    [رعايتي](https://www.buymeacoffee.com/sharevb).

    ## التقنيات

    أدوات تكنولوجيا المعلومات مصممة باستخدام Vue.js (Vue 3) مع مكتبة مكونات
    واجهة المستخدم Naive، وتستضيفها Vercel وتُنشرها باستمرار. تُستخدم مكتبات
    مفتوحة المصدر من جهات خارجية في بعض الأدوات، ويمكنك الاطلاع على القائمة
    الكاملة في ملف
    [package.json](https://github.com/sharevb/it-tools/blob/main/package.json)
    في المستودع.

    ## هل وجدتَ خطأً برمجيًا؟ هل هناك أداة مفقودة؟

    إذا كنتَ بحاجة إلى أداة غير موجودة حاليًا هنا، وتعتقد أنها قد تكون مفيدة،
    فيُرجى تقديم طلب ميزة في [قسم
    المشكلات](https://github.com/sharevb/it-tools/issues/new/choose) في مستودع
    GitHub.

    وإذا وجدتَ خطأً برمجيًا، أو لم يعمل شيء كما هو متوقع، فيُرجى تقديم تقرير عن
    الخطأ في [قسم
    المشكلات](https://github.com/sharevb/it-tools/issues/new/choose) في مستودع
    GitHub.
