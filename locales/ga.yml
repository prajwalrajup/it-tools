      placeholder-e-g-src-port-443-and-dst-10-0-0-1: m.sh., port src 443 agus dst 10.0.0.1
      title-generated-tcpdump-command: Gineadh ordú tcpdump
      tag-tcpdump-is-a-utility-commonly-installed-available-to-many-linux-distributions-to-quickly-gather-a-network-trace-packet-capture-in-short-it-s-the-wireshark-of-linux-to-gathering-packet-captures-tcpdump-is-very-versatile-with-many-switches-to-granularly-capture-what-you-need-to-dubug-network-traffic-with-options-to-output-results-via-console-file-or-wireshark-pcap:
        Is fóntais é tcpdump atá suiteáilte / ar fáil go coitianta i mórán
        dáiltí Linux chun rian líonra / gabháil paicéad a bhailiú go tapa. Go
        hachomair, is é Wireshark Linux é chun gabhálacha paicéad a bhailiú. Tá
        tcpdump an-ildánach le go leor lasca chun a bhfuil uait a ghabháil go
        mion chun trácht líonra a dhubsáil; le roghanna chun torthaí a aschur
        trí chonsól, comhad, nó Wireshark pcap.
      tag-this-utility-is-to-help-generate-a-tcpdump-command-using-some-of-the-more-common-switches-filters-offered-by-the-tcpdump-this-utility-is-not-encompassing-of-all-options-tcpdump-offers-a-complete-list-of-options-can-be-found-via-its-manual-nbsp:
        "Tá an fóntais seo ann chun cabhrú le hordú tcpdump a ghiniúint ag baint
        úsáide as cuid de na lasca/scagairí is coitianta a chuireann tcpdump ar
        fáil. Ní chuimsíonn an fóntais seo gach rogha a chuireann tcpdump ar
        fáil; is féidir liosta iomlán de na roghanna a fháil trína lámhleabhar:"
      tag-https-www-tcpdump-org-manpages-tcpdump-1-html: https://www.tcpdump.org/manpages/tcpdump.1.html
      tag-note: "Nóta:"
      tag-nbsp-host-source-host-and-destination-host-can-take-multiple-entries-separate-your-entries-with-a-comma-space-or-semicolon:
        Is féidir le hÓstach, Óstach Foinseach, agus Óstach Ceann Scríbe glacadh
        le hiontrálacha iolracha. Deighil do chuid iontrálacha le camóg, spás nó
        leathstad.
      tag-note-2: "Nóta 2:"
      tag-nbsp-when-you-specify-a-source-src-or-destination-dst-flags-tcpdump-will-only-filter-in-that-direction-if-you-are-looking-to-capture-full-tcp-handshake-make-sure-you-use-host-vs-src-host-or-dst-host-to-see-both-request-and-response-flow:
        Nuair a shonraíonn tú bratacha foinse (src) nó ceann scríbe (dst), ní
        dhéanfaidh tcpdump scagadh ach sa treo sin. Más mian leat croitheadh
        láimhe TCP iomlán a ghabháil, déan cinnte go n-úsáideann tú
        &quot;host&quot; seachas &quot;src host&quot; nó &quot;dst host&quot;
        chun sreabhadh an iarratais agus an fhreagartha araon a fheiceáil.
      tag-the-network-interface-to-capture-packets-from: An comhéadan líonra chun paicéid a ghabháil uaidh.
      tag-capture-packets-originating-from-this-host: Gabh paicéid a thagann ón óstach seo.
      tag-capture-packets-destined-for-this-host: Gabh na paicéid atá ceaptha don óstach seo.
      tag-filter-packets-from-this-source-port: Scag paicéid ón gcalafort foinse seo.
      tag-filter-packets-going-to-this-destination-port: Scag paicéid atá ag dul chuig an gcalafort ceann scríbe seo.
      tag-stop-capturing-after-this-number-of-packets: Stop ag gabháil tar éis an líon seo paicéad.
      tag-n: -n
      tag-prevent-resolving-ips-to-hostnames: Cosc a chur ar IPanna a réiteach chuig ainmneacha óstach.
      tag-e: -agus
      tag-display-link-layer-headers-in-output: Taispeáin ceanntásca na sraithe nasc san aschur.
      tag-q: -q
