    PomodoroAbout:
      text:
        source-wikipedia: "Kilde: Wikipedia"
        once-the-long-break-is-finished-return-to-step-1: Når den lange pause er overstået, skal du vende tilbage til trin 1.
        keep-repeating-steps-1-3-but-after-your-4th-task-take-a-long-break-instead-of-a-short-break-20-30-minutes-is-common:
          Gentag trin 1-3, men tag en lang pause i stedet for en kort pause
          efter din 4. opgave (20-30 minutter er almindeligt).
        when-the-timer-rings-take-a-short-break-5-10-minutes-is-common:
          Når timeren ringer, skal du holde en kort pause (5-10 minutter er
          almindeligt).
        work-on-the-task-during-that-time: Arbejd på opgaven i den periode.
        decide-on-a-task-and-set-the-timer-25-minutes-is-common: Beslut dig for en
          opgave, og indstil timeren (25 minutter er almindeligt).
        five-steps-of-the-pomodoro-technique: Fem trin i Pomodoro-teknikken
        the-pomodoro-technique-is-a-time-management-method-developed-by-francesco-cirillo-in-the-1980s-it-uses-a-timer-to-break-work-into-intervals-typically-25-minutes-in-length-separated-by-short-breaks-each-interval-is-known-as-a-pomodoro-from-the-italian-word-for-tomato-after-the-tomato-shaped-kitchen-timer-cirillo-used-as-a-university-student:
          Pomodoro-teknikken er en tidsstyringsmetode udviklet af Francesco
          Cirillo i 1980'erne. Den bruger en timer til at opdele arbejdet i
          intervaller, typisk 25 minutter lange, adskilt af korte pauser. Hvert
          interval er kendt som en pomodoro, fra det italienske ord for tomat,
          efter den tomatformede køkkenur, som Cirillo brugte som
          universitetsstuderende.
