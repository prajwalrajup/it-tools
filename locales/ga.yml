        theipeann ar thiomántán amháin, cailltear na sonraí go léir.
      tag-raid-1: RAID 1
      tag-mirroring-data-is-duplicated-across-drives-high-redundancy-low-capacity-efficiency:
        Scáthánú. Déantar sonraí a dhúbailt trasna thiomántán. Ard-iomarcaíocht,
        éifeachtúlacht ísealacmhainne.
      tag-raid-5: RAID 5
      tag-striping-with-parity-can-tolerate-one-drive-failure-balanced-speed-and-redundancy:
        Striapáil le comhionannas. Is féidir teip tiomántáin amháin a fhulaingt.
        Luas agus iomarcaíocht chothrom.
      tag-raid-6: RAID 6
      tag-double-parity-can-survive-two-drive-failures: Paireacht dhúbailte. Is féidir
        leis maireachtáil tar éis dhá theip tiomántáin.
      tag-raid-10: RAID 10
      tag-mirrored-pairs-striped-together-high-performance-and-redundancy:
        Péirí scáthánaithe stríocaithe le chéile. Ardfheidhmíocht agus
        iomarcaíocht.
      tag-raid-z1-z2-z3: RAID-Z1/Z2/Z3
      tag-zfs-based-raid-levels-with-single-double-or-triple-parity-designed-for-data-integrity:
        Leibhéil RAID bunaithe ar ZFS le paireacht aonair, dhúbailte, nó
        triarach. Deartha le haghaidh sláine sonraí.
      tag-raid-50: RAID 50
      tag-stripe-of-raid-5-arrays-combines-performance-of-raid-0-with-redundancy-of-raid-5:
        Stripe d&#39;eagair RAID 5. Comhcheanglaíonn sé feidhmíocht RAID 0 le
        hiomarcaíocht RAID 5.
      tag-️-mtbf-mean-time-between-failures: ⏱️ Meán-Am Idir Teipeanna (MTBF)
      tag-the-average-time-in-hours-a-drive-is-expected-to-operate-before-failing-higher-mtbf-means-more-reliable-hardware:
        An meán-am (in uaireanta) a bhfuiltear ag súil go n-oibreoidh tiomántán
        sula dteipeann air. Ciallaíonn MTBF níos airde crua-earraí níos
        iontaofa.
      tag-rebuild-time: 🔁 Am Athchóirithe
      tag-the-time-required-to-reconstruct-data-on-a-replacement-drive-after-a-failure-longer-rebuild-times-increase-the-risk-of-a-second-failure-during-recovery:
        An t-am a theastaíonn chun sonraí a atógáil ar thiomántán athsholáthair
        tar éis teipe. Méadaíonn amanna atógála níos faide an baol go dtarlóidh
        teip eile le linn téarnaimh.
      tag-mttdl-mean-time-to-data-loss: 📉 MTTDL (Meán-Am go Caillteanas Sonraí)
      tag-a-statistical-estimate-of-how-long-a-raid-system-can-operate-before-data-loss-occurs-it-considers-drive-failures-rebuild-time-and-raid-redundancy-higher-mttdl-means-a-safer-system:
        Meastachán staitistiúil ar cé chomh fada is féidir le córas RAID
        feidhmiú sula gcailltear sonraí. Cuireann sé teipeanna tiomántáin, am
        atógála, agus iomarcaíocht RAID san áireamh. Ciallaíonn MTTDL níos airde
        córas níos sábháilte.
      tag-bit-error-rate-ber: 🧮 Ráta Earráide Giotáin (BER)
      tag-the-probability-that-a-bit-read-from-a-disk-will-be-incorrect-due-to-hardware-limitations-even-tiny-bers-like-1-in-a-trillion-can-cause-issues-during-rebuilds-especially-with-large-drives:
        An dóchúlacht go mbeidh giotán a léitear ó dhiosca mícheart mar gheall
        ar theorainneacha crua-earraí. Is féidir le BERanna beaga bídeacha fiú
        (cosúil le 1 i dtrilliún) fadhbanna a chruthú le linn atógála, go
        háirithe le tiomántáin mhóra.
      tag-unrecoverable-read-error-ure: 🧠 Earráid Léitheoireachta Neamh-aisghabhála (URE)
      tag-occurs-when-a-drive-fails-to-read-a-sector-during-rebuild-ber-contributes-to-ure-risk-which-can-compromise-raid-recovery:
        Tarlaíonn sé seo nuair a theipeann ar thiomántán earnáil a léamh le linn
        atógála. Cuireann BER le riosca URE, rud a d&#39;fhéadfadh cur isteach
        ar aisghabháil RAID.
      tag-drive-capacity-tb: 📦 Cumas Tiomántáin (TB)
      tag-total-storage-per-drive-larger-drives-take-longer-to-rebuild-and-are-more-susceptible-to-ber-related-errors:
        Stóráil iomlán in aghaidh an tiomántáin. Tógann sé níos faide tiomántáin
        níos mó a atógáil agus bíonn siad níos so-ghabhálaí i leith earráidí a
        bhaineann le BER.
      tag-failure-probability: 📈 Dóchúlacht Teipe
      tag-the-chance-that-the-raid-system-will-experience-data-loss-over-a-given-time-period-e-g-5-years-calculated-using-mttdl-and-exponential-failure-models:
        An seans go gcaillfear sonraí sa chóras RAID thar thréimhse áirithe ama
        (m.sh., 5 bliana). Ríomhtar é seo ag baint úsáide as samhlacha MTTDL
        agus teipe easpónantúla.
