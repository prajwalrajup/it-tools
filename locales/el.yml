      tag-key-terms-explained: 🧠 Επεξήγηση βασικών όρων
      tag-raid-level: Επίπεδο RAID
      tag-raid-redundant-array-of-independent-disks-is-a-method-of-combining-multiple-physical-drives-into-one-logical-unit-to-improve-performance-redundancy-or-both:
        Το RAID (Redundant Array of Independent Disks - Πλεονάζουσα Συστοιχία
        Ανεξάρτητων Δίσκοι) είναι μια μέθοδος συνδυασμού πολλαπλών φυσικών
        μονάδων δίσκου σε μία λογική μονάδα για βελτίωση της απόδοσης, πλεονασμό
        ή και τα δύο.
      tag-description: Περιγραφή
      tag-raid-0: RAID 0
      tag-striping-only-no-redundancy-fast-but-risky-if-one-drive-fails-all-data-is-lost:
        Μόνο διαγράμμιση. Χωρίς πλεονασμό. Γρήγορο αλλά επικίνδυνο—αν χαλάσει
        μία μονάδα δίσκου, όλα τα δεδομένα χάνονται.
      tag-raid-1: RAID 1
      tag-mirroring-data-is-duplicated-across-drives-high-redundancy-low-capacity-efficiency:
        Κατοπτρισμός. Τα δεδομένα αντιγράφονται σε όλες τις μονάδες δίσκου.
        Υψηλός πλεονασμός, χαμηλή απόδοση χωρητικότητας.
      tag-raid-5: RAID 5
      tag-striping-with-parity-can-tolerate-one-drive-failure-balanced-speed-and-redundancy:
        Διαγράμμιση με ισοτιμία. Μπορεί να ανεχθεί βλάβη σε μία μονάδα δίσκου.
        Ισορροπημένη ταχύτητα και πλεονασμός.
      tag-raid-6: RAID 6
      tag-double-parity-can-survive-two-drive-failures: Διπλή ισοτιμία. Μπορεί να επιβιώσει από βλάβες δύο μονάδων δίσκου.
      tag-raid-10: RAID 10
      tag-mirrored-pairs-striped-together-high-performance-and-redundancy: Ζεύγη με καθρέφτες ενωμένες μεταξύ τους. Υψηλή απόδοση και πλεονασμός.
      tag-raid-z1-z2-z3: RAID-Z1/Z2/Z3
      tag-zfs-based-raid-levels-with-single-double-or-triple-parity-designed-for-data-integrity:
        Επίπεδα RAID που βασίζονται σε ZFS με μονή, διπλή ή τριπλή ισοτιμία.
        Σχεδιασμένα για ακεραιότητα δεδομένων.
      tag-raid-50: RAID 50
      tag-stripe-of-raid-5-arrays-combines-performance-of-raid-0-with-redundancy-of-raid-5:
        Λωρίδα συστοιχιών RAID 5. Συνδυάζει την απόδοση του RAID 0 με την
        πλεονάζουσα ικανότητα του RAID 5.
      tag-️-mtbf-mean-time-between-failures: ⏱️ MTBF (Μέσος Χρόνος Μεταξύ Βλαβών)
      tag-the-average-time-in-hours-a-drive-is-expected-to-operate-before-failing-higher-mtbf-means-more-reliable-hardware:
        Ο μέσος χρόνος (σε ώρες) που αναμένεται να λειτουργήσει μια μονάδα
        δίσκου πριν από την εμφάνιση βλάβης. Υψηλότερος χρόνος μεταξύ πόλων
        (MTBF) σημαίνει πιο αξιόπιστο υλικό.
      tag-rebuild-time: 🔁 Ώρα για Αναδόμηση
      tag-the-time-required-to-reconstruct-data-on-a-replacement-drive-after-a-failure-longer-rebuild-times-increase-the-risk-of-a-second-failure-during-recovery:
        Ο χρόνος που απαιτείται για την ανακατασκευή δεδομένων σε μια μονάδα
        δίσκου αντικατάστασης μετά από μια βλάβη. Οι μεγαλύτεροι χρόνοι
        ανακατασκευής αυξάνουν τον κίνδυνο δεύτερης βλάβης κατά την
        αποκατάσταση.
      tag-mttdl-mean-time-to-data-loss: 📉 MTTDL (Μέσος Χρόνος έως την Απώλεια Δεδομένων)
      tag-a-statistical-estimate-of-how-long-a-raid-system-can-operate-before-data-loss-occurs-it-considers-drive-failures-rebuild-time-and-raid-redundancy-higher-mttdl-means-a-safer-system:
        Μια στατιστική εκτίμηση για το χρονικό διάστημα που μπορεί να
        λειτουργήσει ένα σύστημα RAID πριν από την απώλεια δεδομένων. Λαμβάνει
        υπόψη τις βλάβες των μονάδων δίσκου, τον χρόνο ανακατασκευής και την
        πλεονάζουσα RAID. Υψηλότερο MTTDL σημαίνει ασφαλέστερο σύστημα.
      tag-bit-error-rate-ber: 🧮 Ρυθμός σφάλματος bit (BER)
      tag-the-probability-that-a-bit-read-from-a-disk-will-be-incorrect-due-to-hardware-limitations-even-tiny-bers-like-1-in-a-trillion-can-cause-issues-during-rebuilds-especially-with-large-drives:
        Η πιθανότητα ένα bit που διαβάζεται από έναν δίσκο να είναι λανθασμένο
        λόγω περιορισμών υλικού. Ακόμα και μικροσκοπικά BER (όπως 1 στο
        τρισεκατομμύριο) μπορούν να προκαλέσουν προβλήματα κατά τις
        ανακατασκευές, ειδικά με μεγάλους δίσκους.
      tag-unrecoverable-read-error-ure: 🧠 Μη ανακτήσιμο σφάλμα ανάγνωσης (URE)
      tag-occurs-when-a-drive-fails-to-read-a-sector-during-rebuild-ber-contributes-to-ure-risk-which-can-compromise-raid-recovery:
        Εμφανίζεται όταν μια μονάδα δίσκου δεν μπορεί να διαβάσει έναν τομέα
        κατά την αναδόμηση. Το BER συμβάλλει στον κίνδυνο URE, ο οποίος μπορεί
        να θέσει σε κίνδυνο την αποκατάσταση RAID.
      tag-drive-capacity-tb: 📦 Χωρητικότητα δίσκου (TB)
      tag-total-storage-per-drive-larger-drives-take-longer-to-rebuild-and-are-more-susceptible-to-ber-related-errors:
        Συνολικός χώρος αποθήκευσης ανά μονάδα δίσκου. Οι μεγαλύτεροι δίσκοι
        χρειάζονται περισσότερο χρόνο για να ανακατασκευαστούν και είναι πιο
        ευάλωτοι σε σφάλματα που σχετίζονται με το BER.
      tag-failure-probability: 📈 Πιθανότητα Αποτυχίας
      tag-the-chance-that-the-raid-system-will-experience-data-loss-over-a-given-time-period-e-g-5-years-calculated-using-mttdl-and-exponential-failure-models:
        Η πιθανότητα το σύστημα RAID να υποστεί απώλεια δεδομένων σε μια
        δεδομένη χρονική περίοδο (π.χ., 5 έτη). Υπολογίζεται με χρήση μοντέλων
        MTTDL και εκθετικών μοντέλων αστοχίας.
