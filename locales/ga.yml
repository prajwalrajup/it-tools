    service:
      text:
        3-drive-failures-per-raid-7-set: 3 theip tiomántáin in aghaidh an tsraith RAID 7
        raid-70-requires-at-least-10-disks-with-5-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          Éilíonn RAID 70 10 ndiosca ar a laghad agus 5 ar a laghad in aghaidh
          an stríoca. Caithfidh líon comhionann dioscaí a bheith sna stríoca.
        raid-70-stripes-multiple-raid-7-arrays-together-raid-7-raid-0-each-raid-7-set-can-sustain-three-drive-failures:
          Cuireann RAID 70 il-eagar RAID 7 le chéile (RAID 7 + RAID 0). Is
          féidir le gach tacar RAID 7 trí theip tiomántáin a sheasamh.
        2-drive-failures-per-raid-6-set: 2 theip tiomántáin in aghaidh an tsraith RAID 6
        raid-60-requires-at-least-8-disks-with-4-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          Éilíonn RAID 60 8 ndiosca ar a laghad agus 4 ar a laghad in aghaidh an
          stríoca. Caithfidh líon comhionann dioscaí a bheith sna stríoca.
        raid-60-stripes-multiple-raid-6-arrays-together-raid-6-raid-0-each-raid-6-set-can-sustain-two-drive-failures:
          Cuireann RAID 60 il-eagar RAID 6 le chéile (RAID 6 + RAID 0). Is
          féidir le gach tacar RAID 6 dhá theip tiomántáin a sheasamh.
        1-drive-failure-per-raid-5-set: Teip tiomántáin amháin in aghaidh an tsraith RAID 5
        raid-50-requires-at-least-6-disks-with-3-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          Éilíonn RAID 50 6 dhiosca ar a laghad agus 3 ar a laghad in aghaidh an
          stríoca. Caithfidh líon comhionann dioscaí a bheith sna stríoca.
        raid-50-stripes-multiple-raid-5-arrays-together-raid-5-raid-0-each-raid-5-set-can-sustain-a-single-drive-failure:
          Cuireann RAID 50 roinnt eagar RAID 5 le chéile (RAID 5 + RAID 0). Is
          féidir le gach tacar RAID 5 teip tiomántáin amháin a sheasamh.
        1-drive-failure-per-mirrored-set: Teip tiomántáin amháin in aghaidh an tsraith scáthánaithe
        raid-10-requires-an-even-number-of-at-least-4-disks: Éilíonn RAID 10 líon cothrom de 4 dhiosca ar a laghad
        raid-10-is-a-stripe-of-mirrors-raid-1-raid-0-each-set-of-drives-is-mirrored-and-striped-together-so-that-each-drive-in-the-set-is-fault-tolerant-within-the-group:
          Is stríoc scáthán é RAID 10 (RAID 1 + RAID 0). Déantar gach sraith
          tiomántán a scáthánú agus a stríocadh le chéile ionas go mbeidh gach
          tiomántán sa tsraith frithsheasmhach in aghaidh lochtanna laistigh den
          ghrúpa.
        3-drive-failures: 3 theip ar thiomántáin
        raid-7-requires-at-least-5-disks: Éilíonn RAID 7 5 dhiosca ar a laghad
        raid-7-raid-tp-non-standard-is-similiar-to-raid-5-and-raid-6-but-with-a-third-parity-block-this-allows-for-a-third-disk-failure-at-the-cost-of-storage-reduction-equal-to-three-drives:
          Tá RAID 7/RAID TP (neamhchaighdeánach) cosúil le RAID 5 agus RAID 6
          ach le bloc tríú paireachta. Ligeann sé seo do theip tríú diosca ar
          chostas laghdaithe stórála atá cothrom le trí thiomántán.
        2-drive-failures: 2 theip ar thiomántán
        raid-6-requires-at-least-4-disks: Éilíonn RAID 6 4 dhiosca ar a laghad
        raid-6-is-similiar-to-raid-5-but-with-an-additional-parity-block-this-allows-for-an-additional-disk-failure-at-the-cost-of-storage-reduction-equal-to-two-drives:
          Tá RAID 6 cosúil le RAID 5 ach le bloc comhionannais breise. Fágann sé
          seo go dtarlaíonn teip diosca breise ar chostas laghdaithe stórála atá
          cothrom le dhá thiomántán.
        1-drive-failure: Teip 1 tiomántáin
