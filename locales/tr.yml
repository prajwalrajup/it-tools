      label-raid-50: RAID 50
      title-mttdl-failure-probability-calculator: MTTDL ve Arıza Olasılığı Hesaplayıcısı
      label-raid-level: "RAID Seviyesi:"
      placeholder-select-raid-level: RAID düzeyini seçin
      label-number-of-drives: "Sürücü Sayısı:"
      label-drive-mtbf-hours: "Sürüş MTBF (saat):"
      label-rebuild-time-hours: "Yeniden İnşa Süresi (saat):"
      label-bit-error-rate-ber-in-1ex: "Bit Hata Oranı (BER/1eX):"
      label-drive-capacity-tb: "Sürücü Kapasitesi (TB):"
      label-years-for-failure-probability: "Başarısızlık olasılığı yılları:"
      label-mttdl-hours: "MTTDL (saat):"
      label-mttdl-years: "MTTDL (yıl):"
      label-failure-probability: "Başarısızlık Olasılığı:"
      tag-key-terms-explained: 🧠 Anahtar Terimlerin Açıklaması
      tag-raid-level: RAID Seviyesi
      tag-raid-redundant-array-of-independent-disks-is-a-method-of-combining-multiple-physical-drives-into-one-logical-unit-to-improve-performance-redundancy-or-both:
        RAID (Bağımsız Disklerin Yedekli Dizisi), performansı, yedekliliği veya
        her ikisini birden artırmak için birden fazla fiziksel sürücüyü tek bir
        mantıksal birimde birleştirme yöntemidir.
      tag-description: Tanım
      tag-raid-0: RAID 0
      tag-striping-only-no-redundancy-fast-but-risky-if-one-drive-fails-all-data-is-lost:
        Sadece şeritleme. Yedeklilik yok. Hızlı ama riskli; bir sürücü
        arızalanırsa tüm veriler kaybolur.
      tag-raid-1: RAID 1
      tag-mirroring-data-is-duplicated-across-drives-high-redundancy-low-capacity-efficiency:
        Yansıtma. Veriler sürücüler arasında kopyalanır. Yüksek yedeklilik,
        düşük kapasite verimliliği.
      tag-raid-5: RAID 5
      tag-striping-with-parity-can-tolerate-one-drive-failure-balanced-speed-and-redundancy:
        Pariteli şeritleme. Tek bir sürücü arızasını tolere edebilir. Dengeli
        hız ve yedeklilik.
      tag-raid-6: RAID 6
      tag-double-parity-can-survive-two-drive-failures: Çift parite. İki sürücü arızasına dayanabilir.
      tag-raid-10: RAID 10
      tag-mirrored-pairs-striped-together-high-performance-and-redundancy: Birlikte çizgili aynalı çiftler. Yüksek performans ve yedeklilik.
      tag-raid-z1-z2-z3: RAID-Z1/Z2/Z3
      tag-zfs-based-raid-levels-with-single-double-or-triple-parity-designed-for-data-integrity:
        Tek, çift veya üçlü pariteye sahip ZFS tabanlı RAID seviyeleri. Veri
        bütünlüğü için tasarlanmıştır.
      tag-raid-50: RAID 50
      tag-stripe-of-raid-5-arrays-combines-performance-of-raid-0-with-redundancy-of-raid-5:
        RAID 5 dizilerinin şeridi. RAID 0'ın performansını RAID 5'in
        yedekliliğiyle birleştirir.
      tag-️-mtbf-mean-time-between-failures: ⏱️ MTBF (Arızalar Arası Ortalama Süre)
      tag-the-average-time-in-hours-a-drive-is-expected-to-operate-before-failing-higher-mtbf-means-more-reliable-hardware:
        Bir sürücünün arızalanmadan önce çalışması beklenen ortalama süre (saat
        cinsinden). Daha yüksek MTBF, daha güvenilir donanım anlamına gelir.
      tag-rebuild-time: 🔁 Yeniden İnşa Zamanı
      tag-the-time-required-to-reconstruct-data-on-a-replacement-drive-after-a-failure-longer-rebuild-times-increase-the-risk-of-a-second-failure-during-recovery:
        Bir arızadan sonra yedek sürücüdeki verileri yeniden oluşturmak için
        gereken süre. Daha uzun yeniden oluşturma süreleri, kurtarma sırasında
        ikinci bir arıza riskini artırır.
      tag-mttdl-mean-time-to-data-loss: 📉 MTTDL (Veri Kaybına Kadar Ortalama Süre)
      tag-a-statistical-estimate-of-how-long-a-raid-system-can-operate-before-data-loss-occurs-it-considers-drive-failures-rebuild-time-and-raid-redundancy-higher-mttdl-means-a-safer-system:
        Bir RAID sisteminin veri kaybı meydana gelmeden önce ne kadar süre
        çalışabileceğine dair istatistiksel bir tahmindir. Sürücü arızalarını,
        yeniden oluşturma süresini ve RAID yedekliliğini dikkate alır. Daha
        yüksek MTTDL, daha güvenli bir sistem anlamına gelir.
      tag-bit-error-rate-ber: 🧮 Bit Hata Oranı (BER)
      tag-the-probability-that-a-bit-read-from-a-disk-will-be-incorrect-due-to-hardware-limitations-even-tiny-bers-like-1-in-a-trillion-can-cause-issues-during-rebuilds-especially-with-large-drives:
        Bir diskten okunan bir bitin donanım kısıtlamaları nedeniyle hatalı olma
        olasılığı. Çok küçük BER'ler (trilyonda 1 gibi) bile, özellikle büyük
        sürücülerde, yeniden yapılandırmalar sırasında sorunlara neden olabilir.
      tag-unrecoverable-read-error-ure: 🧠 Kurtarılamaz Okuma Hatası (URE)
      tag-occurs-when-a-drive-fails-to-read-a-sector-during-rebuild-ber-contributes-to-ure-risk-which-can-compromise-raid-recovery:
        Yeniden oluşturma sırasında bir sürücünün bir sektörü okuyamaması
        durumunda oluşur. BER, RAID kurtarmayı tehlikeye atabilecek URE riskine
        katkıda bulunur.
      tag-drive-capacity-tb: 📦 Sürücü Kapasitesi (TB)
      tag-total-storage-per-drive-larger-drives-take-longer-to-rebuild-and-are-more-susceptible-to-ber-related-errors:
        Sürücü başına toplam depolama alanı. Daha büyük sürücülerin yeniden
        oluşturulması daha uzun sürer ve BER ile ilgili hatalara daha yatkındır.
      tag-failure-probability: 📈 Başarısızlık Olasılığı
      tag-the-chance-that-the-raid-system-will-experience-data-loss-over-a-given-time-period-e-g-5-years-calculated-using-mttdl-and-exponential-failure-models:
        RAID sisteminin belirli bir zaman diliminde (örneğin 5 yıl) veri kaybı
