      placeholder-e-g-src-port-443-and-dst-10-0-0-1: например, порт src 443 и dst 10.0.0.1
      title-generated-tcpdump-command: Сгенерированная команда tcpdump
      tag-tcpdump-is-a-utility-commonly-installed-available-to-many-linux-distributions-to-quickly-gather-a-network-trace-packet-capture-in-short-it-s-the-wireshark-of-linux-to-gathering-packet-captures-tcpdump-is-very-versatile-with-many-switches-to-granularly-capture-what-you-need-to-dubug-network-traffic-with-options-to-output-results-via-console-file-or-wireshark-pcap:
        tcpdump — это утилита, обычно устанавливаемая/доступная во многих
        дистрибутивах Linux для быстрого сбора данных сетевой трассировки и
        захвата пакетов. Короче говоря, это аналог Wireshark для Linux в плане
        сбора данных о пакетах. tcpdump очень универсален и обладает множеством
        опций для точного сбора необходимого сетевого трафика для анализа
        ошибок; с возможностью вывода результатов через консоль, файл или
        Wireshark PCAP.
      tag-this-utility-is-to-help-generate-a-tcpdump-command-using-some-of-the-more-common-switches-filters-offered-by-the-tcpdump-this-utility-is-not-encompassing-of-all-options-tcpdump-offers-a-complete-list-of-options-can-be-found-via-its-manual-nbsp:
        "Эта утилита предназначена для генерации команды tcpdump с
        использованием некоторых наиболее распространённых параметров/фильтров,
        предлагаемых tcpdump. Эта утилита не охватывает все возможности tcpdump;
        полный список параметров можно найти в руководстве пользователя:"
      tag-https-www-tcpdump-org-manpages-tcpdump-1-html: https://www.tcpdump.org/manpages/tcpdump.1.html
      tag-note: "Примечание:"
      tag-nbsp-host-source-host-and-destination-host-can-take-multiple-entries-separate-your-entries-with-a-comma-space-or-semicolon:
        Параметрам «Хост», «Исходный хост» и «Хост назначения» можно присваивать
        несколько значений. Разделяйте значения запятой, пробелом или точкой с
        запятой.
      tag-note-2: "Примечание 2:"
      tag-nbsp-when-you-specify-a-source-src-or-destination-dst-flags-tcpdump-will-only-filter-in-that-direction-if-you-are-looking-to-capture-full-tcp-handshake-make-sure-you-use-host-vs-src-host-or-dst-host-to-see-both-request-and-response-flow:
        При указании флагов источника (src) или назначения (dst) tcpdump будет
        фильтровать данные только в этом направлении. Если вы хотите захватить
        полное TCP-рукопожатие, убедитесь, что вы используете «host», а не «src
        host» или «dst host», чтобы увидеть как поток запросов, так и поток
        ответов.
      tag-the-network-interface-to-capture-packets-from: Сетевой интерфейс для захвата пакетов.
      tag-capture-packets-originating-from-this-host: Перехватывать пакеты, исходящие с этого хоста.
      tag-capture-packets-destined-for-this-host: Захватывать пакеты, предназначенные для этого хоста.
      tag-filter-packets-from-this-source-port: Фильтровать пакеты из этого исходного порта.
      tag-filter-packets-going-to-this-destination-port: Фильтровать пакеты, идущие в этот порт назначения.
      tag-stop-capturing-after-this-number-of-packets: Остановить захват после указанного количества пакетов.
      tag-n: -н
      tag-prevent-resolving-ips-to-hostnames: Запретить преобразование IP-адресов в имена хостов.
      tag-e: -и
      tag-display-link-layer-headers-in-output: Отображать заголовки канального уровня в выходных данных.
      tag-q: -q
      tag-show-less-verbose-packet-information: Показывать менее подробную информацию о пакете.
      tag-save-captured-packets-to-a-file: Сохраните захваченные пакеты в файл.
