  pomodoro-timer:
    title: Таймер Pomodoro
    description: Базовый таймер Pomodoro
    texts:
      tag-import-pomodoroapp-from-app-pomodoroapp-vue: импортировать PomodoroApp из &#39;./app/PomodoroApp.vue&#39;;
    SplashScreen:
      text:
