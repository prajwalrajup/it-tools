    title: Amaire Pomodoro
    description: Uaineadóir Pomodoro Bunúsach
    texts:
      tag-import-pomodoroapp-from-app-pomodoroapp-vue: allmhairigh PomodoroApp ó &#39;./app/PomodoroApp.vue&#39;;
    SplashScreen:
