    title: Máy tính độ tin cậy RAID
    description: Tính toán độ tin cậy của hệ thống lưu trữ bằng phương pháp MTTDL nổi tiếng
    texts:
      label-raid-0: RAID 0
      label-raid-1: Đột kích 1
      label-raid-5: Đột kích 5
      label-raid-6: Đột kích 6
      label-raid-10: RAID 10
      label-raid-z1: RAID-Z1
      label-raid-z2: RAID-Z2
      label-raid-z3: RAID-Z3
      label-raid-50: Đột kích 50
      title-mttdl-failure-probability-calculator: Máy tính xác suất hỏng hóc và MTTDL
      label-raid-level: "Cấp độ RAID:"
      placeholder-select-raid-level: Chọn cấp độ RAID
      label-number-of-drives: "Số lượng ổ đĩa:"
      label-drive-mtbf-hours: "MTBF của ổ đĩa (giờ):"
      label-rebuild-time-hours: "Thời gian xây dựng lại (giờ):"
      label-bit-error-rate-ber-in-1ex: "Tỷ lệ lỗi bit (BER trong 1eX):"
      label-drive-capacity-tb: "Dung lượng ổ đĩa (TB):"
      label-years-for-failure-probability: "Số năm có khả năng thất bại:"
      label-mttdl-hours: "MTTDL (giờ):"
      label-mttdl-years: "MTTDL (năm):"
      label-failure-probability: "Xác suất thất bại:"
      tag-key-terms-explained: 🧠 Giải thích các thuật ngữ chính
      tag-raid-level: Cấp độ RAID
      tag-raid-redundant-array-of-independent-disks-is-a-method-of-combining-multiple-physical-drives-into-one-logical-unit-to-improve-performance-redundancy-or-both:
        RAID (Mảng đĩa độc lập dự phòng) là phương pháp kết hợp nhiều ổ đĩa vật
        lý thành một đơn vị logic để cải thiện hiệu suất, tính dự phòng hoặc cả
        hai.
      tag-description: Sự miêu tả
      tag-raid-0: RAID 0
      tag-striping-only-no-redundancy-fast-but-risky-if-one-drive-fails-all-data-is-lost:
        Chỉ phân chia dữ liệu. Không có dự phòng. Nhanh nhưng rủi ro—nếu một ổ
        đĩa bị hỏng, toàn bộ dữ liệu sẽ bị mất.
      tag-raid-1: Đột kích 1
      tag-mirroring-data-is-duplicated-across-drives-high-redundancy-low-capacity-efficiency:
        Sao chép. Dữ liệu được sao chép trên nhiều ổ đĩa. Độ dự phòng cao, hiệu
        suất dung lượng thấp.
      tag-raid-5: Đột kích 5
      tag-striping-with-parity-can-tolerate-one-drive-failure-balanced-speed-and-redundancy:
        Phân chia dữ liệu theo tính chẵn lẻ. Có thể chịu được lỗi của một ổ đĩa.
        Tốc độ và tính dự phòng cân bằng.
      tag-raid-6: Đột kích 6
      tag-double-parity-can-survive-two-drive-failures: Chẵn lẻ kép. Có thể chịu được hai lần hỏng ổ đĩa.
      tag-raid-10: RAID 10
      tag-mirrored-pairs-striped-together-high-performance-and-redundancy: Các cặp phản chiếu được ghép lại với nhau. Hiệu suất cao và dự phòng.
      tag-raid-z1-z2-z3: RAID-Z1/Z2/Z3
      tag-zfs-based-raid-levels-with-single-double-or-triple-parity-designed-for-data-integrity:
        Các cấp độ RAID dựa trên ZFS với cơ chế chẵn lẻ đơn, đôi hoặc ba. Được
        thiết kế để đảm bảo tính toàn vẹn dữ liệu.
      tag-raid-50: Đột kích 50
      tag-stripe-of-raid-5-arrays-combines-performance-of-raid-0-with-redundancy-of-raid-5: Mảng RAID 5. Kết hợp hiệu suất của RAID 0 với tính dự phòng của RAID 5.
      tag-️-mtbf-mean-time-between-failures: ⏱️ MTBF (Thời gian trung bình giữa các lần hỏng hóc)
      tag-the-average-time-in-hours-a-drive-is-expected-to-operate-before-failing-higher-mtbf-means-more-reliable-hardware:
        Thời gian trung bình (tính bằng giờ) mà ổ đĩa dự kiến hoạt động trước
        khi hỏng. MTBF càng cao thì phần cứng càng đáng tin cậy.
      tag-rebuild-time: 🔁 Thời gian xây dựng lại
      tag-the-time-required-to-reconstruct-data-on-a-replacement-drive-after-a-failure-longer-rebuild-times-increase-the-risk-of-a-second-failure-during-recovery:
        Thời gian cần thiết để tái tạo dữ liệu trên ổ đĩa thay thế sau khi bị
        lỗi. Thời gian tái tạo càng lâu thì nguy cơ xảy ra lỗi lần hai trong quá
        trình phục hồi càng cao.
      tag-mttdl-mean-time-to-data-loss: 📉 MTTDL (Thời gian trung bình mất dữ liệu)
      tag-a-statistical-estimate-of-how-long-a-raid-system-can-operate-before-data-loss-occurs-it-considers-drive-failures-rebuild-time-and-raid-redundancy-higher-mttdl-means-a-safer-system:
        Ước tính thống kê về thời gian hệ thống RAID có thể hoạt động trước khi
        mất dữ liệu. Ước tính này xem xét các lỗi ổ đĩa, thời gian xây dựng lại
        và khả năng dự phòng RAID. MTTDL cao hơn đồng nghĩa với hệ thống an toàn
        hơn.
      tag-bit-error-rate-ber: 🧮 Tỷ lệ lỗi bit (BER)
      tag-the-probability-that-a-bit-read-from-a-disk-will-be-incorrect-due-to-hardware-limitations-even-tiny-bers-like-1-in-a-trillion-can-cause-issues-during-rebuilds-especially-with-large-drives:
        Xác suất một bit được đọc từ đĩa sẽ không chính xác do hạn chế về phần
        cứng. Ngay cả BER nhỏ (khoảng 1 phần nghìn tỷ) cũng có thể gây ra sự cố
        trong quá trình xây dựng lại, đặc biệt là với các ổ đĩa lớn.
