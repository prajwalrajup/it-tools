      label-packet-limit: "حد الحزمة:"
      placeholder-e-g-100: على سبيل المثال، 100
      label-disable-dns-resolution: "تعطيل حل DNS:"
      label-print-link-level-header: "طباعة رأس مستوى الارتباط:"
      label-quick-print: "الطباعة السريعة:"
      label-verbosity-level: "مستوى الإسهاب:"
      label-time-format: "تنسيق الوقت:"
      label-write-to-file: "الكتابة إلى الملف:"
      placeholder-e-g-capture-pcap: على سبيل المثال، capture.pcap
      label-custom-expression: "تعبير مخصص:"
      placeholder-e-g-src-port-443-and-dst-10-0-0-1: على سبيل المثال، منفذ src 443 وdst 10.0.0.1
      title-generated-tcpdump-command: أمر tcpdump المُولَّد
      tag-tcpdump-is-a-utility-commonly-installed-available-to-many-linux-distributions-to-quickly-gather-a-network-trace-packet-capture-in-short-it-s-the-wireshark-of-linux-to-gathering-packet-captures-tcpdump-is-very-versatile-with-many-switches-to-granularly-capture-what-you-need-to-dubug-network-traffic-with-options-to-output-results-via-console-file-or-wireshark-pcap:
        tcpdump أداة شائعة الاستخدام ومتوفرة في العديد من توزيعات لينكس لجمع
        بيانات تتبع الشبكة/التقاط حزم البيانات بسرعة. باختصار، إنها بمثابة
        Wireshark لينكس لجمع بيانات التقاط حزم البيانات. يتميز tcpdump بتعدد
        استخداماته، حيث يضم العديد من المفاتيح لالتقاط ما تحتاجه بدقة لتحليل
        حركة مرور الشبكة؛ مع خيارات لعرض النتائج عبر وحدة التحكم، أو الملف، أو
        Wireshark PCAP.
      tag-this-utility-is-to-help-generate-a-tcpdump-command-using-some-of-the-more-common-switches-filters-offered-by-the-tcpdump-this-utility-is-not-encompassing-of-all-options-tcpdump-offers-a-complete-list-of-options-can-be-found-via-its-manual-nbsp:
        هذه الأداة تُساعد في إنشاء أمر tcpdump باستخدام بعض المفاتيح/المرشحات
        الأكثر شيوعًا التي يُوفرها tcpdump. لا تُغطي هذه الأداة جميع خيارات
        tcpdump؛ يُمكنك الاطلاع على قائمة كاملة بالخيارات من خلال دليل
        الاستخدام.
      tag-https-www-tcpdump-org-manpages-tcpdump-1-html: https://www.tcpdump.org/manpages/tcpdump.1.html
      tag-note: "ملحوظة:"
      tag-nbsp-host-source-host-and-destination-host-can-take-multiple-entries-separate-your-entries-with-a-comma-space-or-semicolon:
        يمكن للمضيف، والمضيف المصدر، والمضيف الوجهة استيعاب عدة إدخالات. افصل
        إدخالاتك بفاصلة أو مسافة أو فاصلة منقوطة.
      tag-note-2: "ملاحظة 2:"
      tag-nbsp-when-you-specify-a-source-src-or-destination-dst-flags-tcpdump-will-only-filter-in-that-direction-if-you-are-looking-to-capture-full-tcp-handshake-make-sure-you-use-host-vs-src-host-or-dst-host-to-see-both-request-and-response-flow:
        عند تحديد علامة المصدر (src) أو الوجهة (dst)، سيقوم tcpdump بالتصفية في
        هذا الاتجاه فقط. إذا كنت ترغب في التقاط مصافحة TCP كاملة، فتأكد من
        استخدام &quot;host&quot; بدلاً من &quot;src host&quot; أو &quot;dst
        host&quot; لمشاهدة تدفق الطلب والاستجابة.
      tag-the-network-interface-to-capture-packets-from: واجهة الشبكة لالتقاط الحزم منها.
      tag-capture-packets-originating-from-this-host: التقاط الحزم الصادرة من هذا المضيف.
      tag-capture-packets-destined-for-this-host: التقاط الحزم الموجهة إلى هذا المضيف.
      tag-filter-packets-from-this-source-port: تصفية الحزم من منفذ المصدر هذا.
      tag-filter-packets-going-to-this-destination-port: تصفية الحزم المتجهة إلى منفذ الوجهة هذا.
      tag-stop-capturing-after-this-number-of-packets: إيقاف الالتقاط بعد هذا العدد من الحزم.
      tag-n: -ن
      tag-prevent-resolving-ips-to-hostnames: منع حل عناوين IP لأسماء المضيفين.
      tag-e: -و
      tag-display-link-layer-headers-in-output: عرض رؤوس طبقة الارتباط في الإخراج.
      tag-q: -q
      tag-show-less-verbose-packet-information: إظهار معلومات الحزمة الأقل تفصيلاً.
      tag-save-captured-packets-to-a-file: حفظ الحزم الملتقطة في ملف.
      tag-advanced-filters-for-packet-selection: مرشحات متقدمة لاختيار الحزمة.
