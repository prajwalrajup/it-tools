    title: Таймер Pomodoro
    description: Базовий таймер Pomodoro
    texts:
      tag-import-pomodoroapp-from-app-pomodoroapp-vue: імпортувати PomodoroApp з &#39;./app/PomodoroApp.vue&#39;;
    SplashScreen:
      text:
