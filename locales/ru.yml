      tag-capacity: Емкость
      tag-fault-tolerance: Отказоустойчивость
      tag-space-efficiency: Эффективность использования пространства
    text:
      num-1-drive-failures: "{0} сбоев привода"
    service:
      text:
        3-drive-failures-per-raid-7-set: 3 отказа дисков на набор RAID 7
        raid-70-requires-at-least-10-disks-with-5-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          Для RAID 70 требуется не менее 10 дисков, по 5 на полосу. Полосы
          должны содержать одинаковое количество дисков.
        raid-70-stripes-multiple-raid-7-arrays-together-raid-7-raid-0-each-raid-7-set-can-sustain-three-drive-failures:
          RAID 70 объединяет несколько массивов RAID 7 (RAID 7 + RAID 0). Каждый
          массив RAID 7 может выдержать отказ трёх дисков.
        2-drive-failures-per-raid-6-set: 2 отказа дисков на набор RAID 6
        raid-60-requires-at-least-8-disks-with-4-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          Для RAID 60 требуется не менее 8 дисков, по 4 на полосу. Полосы должны
          содержать одинаковое количество дисков.
        raid-60-stripes-multiple-raid-6-arrays-together-raid-6-raid-0-each-raid-6-set-can-sustain-two-drive-failures:
          RAID 60 объединяет несколько массивов RAID 6 (RAID 6 + RAID 0). Каждый
          массив RAID 6 может выдержать отказ двух дисков.
        1-drive-failure-per-raid-5-set: 1 отказ диска на набор RAID 5
        raid-50-requires-at-least-6-disks-with-3-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          Для RAID 50 требуется не менее 6 дисков, по 3 на полосу. Полосы должны
          содержать одинаковое количество дисков.
        raid-50-stripes-multiple-raid-5-arrays-together-raid-5-raid-0-each-raid-5-set-can-sustain-a-single-drive-failure:
          RAID 50 объединяет несколько массивов RAID 5 (RAID 5 + RAID 0). Каждый
          массив RAID 5 может выдержать отказ одного диска.
        1-drive-failure-per-mirrored-set: 1 отказ диска на зеркальный набор
        raid-10-requires-an-even-number-of-at-least-4-disks: Для RAID 10 требуется четное количество дисков (не менее 4)
        raid-10-is-a-stripe-of-mirrors-raid-1-raid-0-each-set-of-drives-is-mirrored-and-striped-together-so-that-each-drive-in-the-set-is-fault-tolerant-within-the-group:
          RAID 10 — это чередование зеркал (RAID 1 + RAID 0). Каждый набор
          дисков зеркалируется и чередуется, что обеспечивает отказоустойчивость
          каждого диска в группе.
        3-drive-failures: 3 отказа дисков
        raid-7-requires-at-least-5-disks: RAID 7 требует не менее 5 дисков
        raid-7-raid-tp-non-standard-is-similiar-to-raid-5-and-raid-6-but-with-a-third-parity-block-this-allows-for-a-third-disk-failure-at-the-cost-of-storage-reduction-equal-to-three-drives:
          RAID 7/RAID TP (нестандартный) аналогичен RAID 5 и RAID 6, но с
          третьим блоком четности. Это допускает отказ третьего диска за счет
          сокращения объема хранилища на три диска.
        2-drive-failures: 2 отказа дисков
        raid-6-requires-at-least-4-disks: RAID 6 требует не менее 4 дисков
        raid-6-is-similiar-to-raid-5-but-with-an-additional-parity-block-this-allows-for-an-additional-disk-failure-at-the-cost-of-storage-reduction-equal-to-two-drives:
          RAID 6 аналогичен RAID 5, но с дополнительным блоком чётности. Это
          допускает отказ ещё одного диска за счёт сокращения объёма хранилища,
          равного двум дискам.
        1-drive-failure: 1 отказ диска
        raid-5-requires-at-least-3-disks: RAID 5 требует как минимум 3 диска
        raid-5-uses-block-level-striping-with-parity-this-allows-for-fault-tolerance-with-a-storage-reduction-equal-to-one-drive-for-the-parity-information:
          RAID 5 использует чередование на уровне блоков с контролем чётности.
          Это обеспечивает отказоустойчивость и сокращает объём хранилища для
          информации о чётности на один диск.
        raid-1-requires-at-least-1-disk: Для RAID 1 требуется как минимум 1 диск
        raid-1-consists-of-an-exact-copy-of-the-data-mirror-across-two-or-more-disks-the-array-will-operate-as-long-as-at-least-one-drive-is-operational:
          RAID 1 представляет собой точную копию данных (зеркалирование) на двух
          или более дисках. Массив будет работать до тех пор, пока хотя бы один
          диск работоспособен.
        raid-0-requires-at-least-1-disk: Для RAID 0 требуется как минимум 1 диск
        raid-0-splits-data-evenly-across-2-or-more-disks-without-redunancy-or-fault-tolerance-creating-one-large-storage-space:
          RAID 0 равномерно распределяет данные по 2 или более дискам без
          избыточности или отказоустойчивости, создавая одно большое
          пространство хранения.
