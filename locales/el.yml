about:
  alltools-title: Όλα τα {toolsCount} εργαλεία
  tools:
    name: Ονομα
    desc: Περιγραφή
    category: Κατηγορία
  content-fork: >
    # Σχετικά με τα Εργαλεία Πληροφορικής

    Αυτός ο υπέροχος ιστότοπος, που δημιουργήθηκε με ❤ αρχικά από τον [Corentin
    Thomasset](https://corentin.tech?utm_source=it-tools&utm_medium=about) και
    επεκτάθηκε από το ShareVB, συγκεντρώνει χρήσιμα εργαλεία για προγραμματιστές
    και άτομα που εργάζονται στον τομέα της Πληροφορικής. Αν το βρείτε χρήσιμο,
    μη διστάσετε να το μοιραστείτε με άτομα που πιστεύετε ότι μπορεί να το βρουν
    επίσης χρήσιμο και μην ξεχάσετε να το προσθέσετε στα αγαπημένα σας στη
    γραμμή συντομεύσεων!

    Το IT Tools είναι ανοιχτού κώδικα (με άδεια χρήσης GPL-3.0) και δωρεάν, και
    θα είναι πάντα. Αν θέλετε να υποστηρίξετε την εργασία μου σε αυτό το fork
    και να με ενθαρρύνετε να προσθέσω περισσότερα εργαλεία ή λειτουργίες,
    σκεφτείτε να το υποστηρίξετε [χορηγώντας
    με](https://www.buymeacoffee.com/sharevb).

    ## Τεχνολογίες

    Το IT Tools είναι κατασκευασμένο σε Vue.js (Vue 3) με τη βιβλιοθήκη
    στοιχείων Naive UI και φιλοξενείται και αναπτύσσεται συνεχώς από την Vercel.
    Σε ορισμένα εργαλεία χρησιμοποιούνται βιβλιοθήκες ανοιχτού κώδικα τρίτων
    κατασκευαστών. Μπορείτε να βρείτε την πλήρη λίστα στο αρχείο
    [package.json](https://github.com/sharevb/it-tools/blob/main/package.json)
    του αποθετηρίου.

    ## Βρήκατε κάποιο σφάλμα; Λείπει κάποιο εργαλείο;

    Εάν χρειάζεστε ένα εργαλείο που δεν υπάρχει αυτήν τη στιγμή εδώ και
    πιστεύετε ότι μπορεί να είναι χρήσιμο, μπορείτε να υποβάλετε ένα αίτημα
    λειτουργίας στην [ενότητα
    προβλημάτων](https://github.com/sharevb/it-tools/issues/new/choose) στο
    αποθετήριο GitHub.

    Και εάν εντοπίσετε κάποιο σφάλμα ή κάτι δεν λειτουργεί όπως αναμένεται,
    υποβάλετε μια αναφορά σφάλματος στην [ενότητα
    προβλημάτων](https://github.com/sharevb/it-tools/issues/new/choose) στο
    αποθετήριο GitHub.
