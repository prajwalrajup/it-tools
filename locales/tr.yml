    PomodoroAbout:
      text:
        source-wikipedia: "Kaynak: Wikipedia"
        once-the-long-break-is-finished-return-to-step-1: Uzun mola bittikten sonra 1. Adıma geri dönün.
        keep-repeating-steps-1-3-but-after-your-4th-task-take-a-long-break-instead-of-a-short-break-20-30-minutes-is-common:
          1-3. Adımları tekrarlamaya devam edin, ancak 4. görevinizden sonra
          kısa bir mola yerine uzun bir mola verin (genellikle 20-30 dakika).
        when-the-timer-rings-take-a-short-break-5-10-minutes-is-common: Zamanlayıcı çaldığında kısa bir mola verin (genelde 5-10 dakika).
        work-on-the-task-during-that-time: Bu süre zarfında görev üzerinde çalışın.
        decide-on-a-task-and-set-the-timer-25-minutes-is-common: Bir görev belirleyin ve zamanlayıcıyı ayarlayın (genellikle 25 dakika).
        five-steps-of-the-pomodoro-technique: Pomodoro Tekniğinin Beş Adımı
        the-pomodoro-technique-is-a-time-management-method-developed-by-francesco-cirillo-in-the-1980s-it-uses-a-timer-to-break-work-into-intervals-typically-25-minutes-in-length-separated-by-short-breaks-each-interval-is-known-as-a-pomodoro-from-the-italian-word-for-tomato-after-the-tomato-shaped-kitchen-timer-cirillo-used-as-a-university-student:
          Pomodoro Tekniği, 1980'lerde Francesco Cirillo tarafından geliştirilen
          bir zaman yönetimi yöntemidir. Çalışmayı genellikle 25 dakika
          uzunluğunda ve kısa molalarla ayrılmış aralıklara bölmek için bir
          zamanlayıcı kullanır. Her aralığa, Cirillo'nun üniversite
          öğrencisiyken kullandığı domates şeklindeki mutfak zamanlayıcısından
          esinlenerek, İtalyanca domates kelimesinden türetilen pomodoro denir.
