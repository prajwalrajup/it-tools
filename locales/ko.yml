      tag-a-statistical-estimate-of-how-long-a-raid-system-can-operate-before-data-loss-occurs-it-considers-drive-failures-rebuild-time-and-raid-redundancy-higher-mttdl-means-a-safer-system:
        RAID 시스템이 데이터 손실이 발생하기 전까지 작동할 수 있는 시간을 통계적으로 추정한 값입니다. 드라이브 고장, 재구축 시간,
        RAID 중복성을 고려합니다. MTTDL이 높을수록 시스템이 더 안전합니다.
      tag-bit-error-rate-ber: 🧮 비트 오류율(BER)
      tag-the-probability-that-a-bit-read-from-a-disk-will-be-incorrect-due-to-hardware-limitations-even-tiny-bers-like-1-in-a-trillion-can-cause-issues-during-rebuilds-especially-with-large-drives:
        "하드웨어 제한으로 인해 디스크에서 읽은 비트가 정확하지 않을 가능성이 있습니다. BER이 매우 낮더라도(예: 1조 분의 1)
        특히 대용량 드라이브의 경우 재구축 과정에서 문제가 발생할 수 있습니다."
      tag-unrecoverable-read-error-ure: 🧠 복구할 수 없는 읽기 오류(URE)
      tag-occurs-when-a-drive-fails-to-read-a-sector-during-rebuild-ber-contributes-to-ure-risk-which-can-compromise-raid-recovery: 드라이브가 재구축 중 섹터를 읽지 못할 때 발생합니다. BER은 URE 위험을 증가시켜 RAID 복구를 손상시킬 수 있습니다.
      tag-drive-capacity-tb: 📦 드라이브 용량(TB)
      tag-total-storage-per-drive-larger-drives-take-longer-to-rebuild-and-are-more-susceptible-to-ber-related-errors: 드라이브당 총 저장 용량입니다. 드라이브 용량이 클수록 재구축 시간이 더 오래 걸리고 BER 관련 오류에 더 취약합니다.
      tag-failure-probability: 📈 실패 확률
      tag-the-chance-that-the-raid-system-will-experience-data-loss-over-a-given-time-period-e-g-5-years-calculated-using-mttdl-and-exponential-failure-models:
        "RAID 시스템이 특정 기간(예: 5년) 동안 데이터 손실을 경험할 확률입니다. MTTDL 및 지수적 실패 모델을 사용하여
        계산됩니다."
