    title: Pomodoro Zamanlayıcısı
    description: Temel Pomodoro Zamanlayıcısı
    texts:
      tag-import-pomodoroapp-from-app-pomodoroapp-vue: PomodoroApp'i './app/PomodoroApp.vue' konumundan içe aktarın;
