      tag-space-efficiency: Ефективність простору
    text:
      num-1-drive-failures: "{0} збоїв диска"
    service:
      text:
        3-drive-failures-per-raid-7-set: 3 збої дисків на комплект RAID 7
        raid-70-requires-at-least-10-disks-with-5-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          RAID 70 вимагає щонайменше 10 дисків, по 5 мінімум на смугу. Смуги
          повинні містити однакову кількість дисків.
        raid-70-stripes-multiple-raid-7-arrays-together-raid-7-raid-0-each-raid-7-set-can-sustain-three-drive-failures:
          RAID 70 об&#39;єднує кілька масивів RAID 7 разом (RAID 7 + RAID 0).
          Кожен набір RAID 7 може витримати три відмови дисків.
        2-drive-failures-per-raid-6-set: 2 збої дисків на комплект RAID 6
        raid-60-requires-at-least-8-disks-with-4-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          RAID 60 вимагає щонайменше 8 дисків, по 4 диски на кожну смугу. Смуги
          повинні містити однакову кількість дисків.
        raid-60-stripes-multiple-raid-6-arrays-together-raid-6-raid-0-each-raid-6-set-can-sustain-two-drive-failures:
          RAID 60 об&#39;єднує кілька масивів RAID 6 разом (RAID 6 + RAID 0).
          Кожен набір RAID 6 може витримати два збої дисків.
        1-drive-failure-per-raid-5-set: 1 збій диска на комплект RAID 5
        raid-50-requires-at-least-6-disks-with-3-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          RAID 50 вимагає щонайменше 6 дисків, по 3 диски на кожну смугу. Смуги
          повинні містити однакову кількість дисків.
        raid-50-stripes-multiple-raid-5-arrays-together-raid-5-raid-0-each-raid-5-set-can-sustain-a-single-drive-failure:
          RAID 50 об&#39;єднує кілька масивів RAID 5 разом (RAID 5 + RAID 0).
          Кожен набір RAID 5 може витримати збій одного диска.
        1-drive-failure-per-mirrored-set: 1 збій диска на дзеркальний набір
        raid-10-requires-an-even-number-of-at-least-4-disks: RAID 10 вимагає парної кількості дисків, щонайменше 4.
        raid-10-is-a-stripe-of-mirrors-raid-1-raid-0-each-set-of-drives-is-mirrored-and-striped-together-so-that-each-drive-in-the-set-is-fault-tolerant-within-the-group:
          RAID 10 — це смуга дзеркал (RAID 1 + RAID 0). Кожен набір дисків
          дзеркалюється та розподіляється разом, щоб кожен диск у наборі був
          відмовостійким у межах групи.
        3-drive-failures: 3 збої диска
        raid-7-requires-at-least-5-disks: RAID 7 вимагає щонайменше 5 дисків
        raid-7-raid-tp-non-standard-is-similiar-to-raid-5-and-raid-6-but-with-a-third-parity-block-this-allows-for-a-third-disk-failure-at-the-cost-of-storage-reduction-equal-to-three-drives:
          RAID 7/RAID TP (нестандартний) схожий на RAID 5 та RAID 6, але з
          третім блоком парності. Це дозволяє вивести з ладу третій диск ціною
          зменшення обсягу сховища, що дорівнює трьом дискам.
        2-drive-failures: 2 збої дисків
        raid-6-requires-at-least-4-disks: RAID 6 вимагає щонайменше 4 дисків
        raid-6-is-similiar-to-raid-5-but-with-an-additional-parity-block-this-allows-for-an-additional-disk-failure-at-the-cost-of-storage-reduction-equal-to-two-drives:
          RAID 6 схожий на RAID 5, але з додатковим блоком парності. Це дозволяє
          виправити додатковий збій диска ціною зменшення обсягу сховища,
          еквівалентного двом дискам.
        1-drive-failure: 1 збій диска
        raid-5-requires-at-least-3-disks: RAID 5 вимагає щонайменше 3 дисків
        raid-5-uses-block-level-striping-with-parity-this-allows-for-fault-tolerance-with-a-storage-reduction-equal-to-one-drive-for-the-parity-information:
          RAID 5 використовує блочне чергування з контролем парності. Це
          забезпечує відмовостійкість зі зменшенням обсягу пам&#39;яті, що
          дорівнює одному диску для зберігання інформації про парність.
        raid-1-requires-at-least-1-disk: RAID 1 вимагає щонайменше 1 диск
        raid-1-consists-of-an-exact-copy-of-the-data-mirror-across-two-or-more-disks-the-array-will-operate-as-long-as-at-least-one-drive-is-operational:
          RAID 1 складається з точної копії даних (дзеркала) на двох або більше
          дисках. Масив працюватиме, поки хоча б один диск працює.
        raid-0-requires-at-least-1-disk: RAID 0 вимагає щонайменше 1 диск
        raid-0-splits-data-evenly-across-2-or-more-disks-without-redunancy-or-fault-tolerance-creating-one-large-storage-space:
          RAID 0 рівномірно розподіляє дані між 2 або більше дисками без
          надмірності чи відмовостійкості, створюючи один великий простір для
          зберігання.
