        Wenn Sie ein Quell- (src) oder Ziel- (dst) Flag angeben, filtert tcpdump
        nur in diese Richtung. Wenn Sie den vollständigen TCP-Handshake erfassen
        möchten, verwenden Sie unbedingt „Host“ statt „Src-Host“ oder
