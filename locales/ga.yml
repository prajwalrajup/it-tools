    PomodoroAbout:
      text:
        source-wikipedia: "Foinse: Vicipéid"
        once-the-long-break-is-finished-return-to-step-1: Nuair a bheidh an sos fada thart, téigh ar ais go Céim 1.
        keep-repeating-steps-1-3-but-after-your-4th-task-take-a-long-break-instead-of-a-short-break-20-30-minutes-is-common:
          Coinnigh ort ag déanamh Céimeanna 1-3 arís, ach tar éis do 4ú tasc,
          glac sos fada in ionad sos gearr (is gnách go nglacann tú 20-30
          nóiméad).
        when-the-timer-rings-take-a-short-break-5-10-minutes-is-common:
          Nuair a bhuaileann an lasc ama, glac sos gearr (is gnách go mbíonn
          5-10 nóiméad ann).
        work-on-the-task-during-that-time: Oibrigh ar an tasc le linn an ama sin.
        decide-on-a-task-and-set-the-timer-25-minutes-is-common: Cinneadh a dhéanamh ar
          thasc agus an lasc ama a shocrú (is gnách go mbíonn 25 nóiméad ann).
        five-steps-of-the-pomodoro-technique: Cúig chéim den Teicníc Pomodoro
        the-pomodoro-technique-is-a-time-management-method-developed-by-francesco-cirillo-in-the-1980s-it-uses-a-timer-to-break-work-into-intervals-typically-25-minutes-in-length-separated-by-short-breaks-each-interval-is-known-as-a-pomodoro-from-the-italian-word-for-tomato-after-the-tomato-shaped-kitchen-timer-cirillo-used-as-a-university-student:
          Is modh bainistíochta ama é Teicníc Pomodoro a d&#39;fhorbair
          Francesco Cirillo sna 1980idí. Úsáideann sé lasc ama chun obair a
          bhriseadh síos ina eatraimh, 25 nóiméad ar fhad de ghnáth, scartha le
          sosanna gearra. Tugtar pomodoro ar gach eatramh, ón bhfocal Iodáilise
          do thráta, i ndiaidh an lasc ama cistine tráta-chruthach a d&#39;úsáid
          Cirillo mar mhac léinn ollscoile.
        the-pomodoro-technique: An Teicníc Pomodoro
