        "tcpdump ist ein häufig installiertes und in vielen Linux-Distributionen
        verfügbares Dienstprogramm zur schnellen Netzwerkverfolgung und
        Paketerfassung. Kurz gesagt: Es ist das Wireshark von Linux zur
        Erfassung von Paketerfassungen. tcpdump ist sehr vielseitig und verfügt
        über zahlreiche Schalter, um den Netzwerkverkehr detailliert zu
        erfassen. Mit Optionen zur Ausgabe der Ergebnisse über die Konsole,
        Datei oder Wireshark PCAP."
