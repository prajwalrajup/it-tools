      label-failure-probability: "Ausfallwahrscheinlichkeit:"
      tag-key-terms-explained: 🧠 Wichtige Begriffe erklärt
      tag-raid-level: RAID-Level
      tag-raid-redundant-array-of-independent-disks-is-a-method-of-combining-multiple-physical-drives-into-one-logical-unit-to-improve-performance-redundancy-or-both:
        RAID (Redundant Array of Independent Disks) ist eine Methode zum
        Kombinieren mehrerer physischer Laufwerke zu einer logischen Einheit, um
        die Leistung, Redundanz oder beides zu verbessern.
      tag-description: Beschreibung
      tag-raid-0: RAID 0
      tag-striping-only-no-redundancy-fast-but-risky-if-one-drive-fails-all-data-is-lost:
        Nur Striping. Keine Redundanz. Schnell, aber riskant – wenn ein Laufwerk
        ausfällt, sind alle Daten verloren.
      tag-raid-1: RAID 1
      tag-mirroring-data-is-duplicated-across-drives-high-redundancy-low-capacity-efficiency:
        Spiegelung. Daten werden auf mehreren Laufwerken dupliziert. Hohe
        Redundanz, geringe Kapazitätseffizienz.
      tag-raid-5: RAID 5
      tag-striping-with-parity-can-tolerate-one-drive-failure-balanced-speed-and-redundancy:
        Striping mit Parität. Kann einen Laufwerksausfall tolerieren.
        Ausgewogene Geschwindigkeit und Redundanz.
      tag-raid-6: RAID 6
      tag-double-parity-can-survive-two-drive-failures: Doppelte Parität. Kann zwei Laufwerksausfälle überstehen.
      tag-raid-10: RAID 10
      tag-mirrored-pairs-striped-together-high-performance-and-redundancy: Gespiegelte Paare zusammengeführt. Hohe Leistung und Redundanz.
      tag-raid-z1-z2-z3: RAID-Z1/Z2/Z3
      tag-zfs-based-raid-levels-with-single-double-or-triple-parity-designed-for-data-integrity:
        ZFS-basierte RAID-Level mit einfacher, doppelter oder dreifacher
        Parität. Entwickelt für Datenintegrität.
      tag-raid-50: RAID 50
      tag-stripe-of-raid-5-arrays-combines-performance-of-raid-0-with-redundancy-of-raid-5:
        Streifen von RAID 5-Arrays. Kombiniert die Leistung von RAID 0 mit der
        Redundanz von RAID 5.
      tag-️-mtbf-mean-time-between-failures: ⏱️ MTBF (mittlere Betriebsdauer zwischen Ausfällen)
      tag-the-average-time-in-hours-a-drive-is-expected-to-operate-before-failing-higher-mtbf-means-more-reliable-hardware:
        Die durchschnittliche Betriebszeit (in Stunden) eines Laufwerks vor
        einem Ausfall. Eine höhere MTBF bedeutet zuverlässigere Hardware.
      tag-rebuild-time: 🔁 Wiederaufbauzeit
      tag-the-time-required-to-reconstruct-data-on-a-replacement-drive-after-a-failure-longer-rebuild-times-increase-the-risk-of-a-second-failure-during-recovery:
        Die Zeit, die benötigt wird, um Daten auf einem Ersatzlaufwerk nach
        einem Ausfall wiederherzustellen. Längere Wiederherstellungszeiten
        erhöhen das Risiko eines zweiten Ausfalls während der Wiederherstellung.
      tag-mttdl-mean-time-to-data-loss: 📉 MTTDL (Mittlere Zeit bis zum Datenverlust)
      tag-a-statistical-estimate-of-how-long-a-raid-system-can-operate-before-data-loss-occurs-it-considers-drive-failures-rebuild-time-and-raid-redundancy-higher-mttdl-means-a-safer-system:
        Eine statistische Schätzung, wie lange ein RAID-System betrieben werden
        kann, bevor Datenverlust auftritt. Dabei werden Laufwerksausfälle,
        Wiederherstellungszeit und RAID-Redundanz berücksichtigt. Eine höhere
        MTTDL bedeutet ein sichereres System.
      tag-bit-error-rate-ber: 🧮 Bitfehlerrate (BER)
      tag-the-probability-that-a-bit-read-from-a-disk-will-be-incorrect-due-to-hardware-limitations-even-tiny-bers-like-1-in-a-trillion-can-cause-issues-during-rebuilds-especially-with-large-drives:
        Die Wahrscheinlichkeit, dass ein von einer Festplatte gelesenes Bit
        aufgrund von Hardwareeinschränkungen fehlerhaft ist. Selbst kleine BERs
        (etwa 1 zu einer Billion) können bei der Wiederherstellung Probleme
        verursachen, insbesondere bei großen Laufwerken.
      tag-unrecoverable-read-error-ure: 🧠 Nicht behebbarer Lesefehler (URE)
      tag-occurs-when-a-drive-fails-to-read-a-sector-during-rebuild-ber-contributes-to-ure-risk-which-can-compromise-raid-recovery:
        Tritt auf, wenn ein Laufwerk während der Neuerstellung einen Sektor
        nicht lesen kann. BER trägt zum URE-Risiko bei, das die
        RAID-Wiederherstellung beeinträchtigen kann.
      tag-drive-capacity-tb: 📦 Laufwerkskapazität (TB)
      tag-total-storage-per-drive-larger-drives-take-longer-to-rebuild-and-are-more-susceptible-to-ber-related-errors:
        Gesamtspeicher pro Laufwerk. Größere Laufwerke benötigen mehr Zeit zum
        Wiederherstellen und sind anfälliger für BER-bezogene Fehler.
      tag-failure-probability: 📈 Ausfallwahrscheinlichkeit
      tag-the-chance-that-the-raid-system-will-experience-data-loss-over-a-given-time-period-e-g-5-years-calculated-using-mttdl-and-exponential-failure-models:
        Die Wahrscheinlichkeit, dass im RAID-System über einen bestimmten
        Zeitraum (z. B. 5 Jahre) Datenverlust auftritt. Berechnet mithilfe von
        MTTDL und exponentiellen Ausfallmodellen.
