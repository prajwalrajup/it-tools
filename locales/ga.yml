  content-fork: >
    # Maidir le hUirlisí TF

    Tá uirlisí úsáideacha comhiomlánaithe ag an suíomh Gréasáin iontach seo,
    arna chruthú le ❤ ar dtús ag [Corentin
    Thomasset](https://corentin.tech?utm_source=it-tools&utm_medium=about) agus
    arna leathnú ag ShareVB, do fhorbróirí agus do dhaoine atá ag obair in TF.
    Má fhaigheann tú é úsáideach, bíodh leisce ort é a roinnt le daoine a
    cheapann tú a d'fhéadfadh a bheith úsáideach dóibh freisin agus ná déan
    dearmad é a leabharmharcáil i do bharra aicearra!

    Is foinse oscailte é Uirlisí TF (faoin gceadúnas GPL-3.0) agus saor in
    aisce, agus beidh sé i gcónaí. Más mian leat tacú le mo chuid oibre ar an
    bhforc seo, agus mé a spreagadh chun níos mó uirlisí nó feidhmiúlachtaí a
    chur leis, smaoinigh ar thacaíocht a thabhairt trí [urraíocht a dhéanamh
    orm](https://www.buymeacoffee.com/sharevb).

    ## Teicneolaíochtaí

    Tá Uirlisí TF déanta i Vue.js (Vue 3) leis an leabharlann comhpháirteanna
    Naive UI agus tá sé á óstáil agus á imscaradh go leanúnach ag Vercel.
    Úsáidtear leabharlanna foinse oscailte tríú páirtí i roinnt uirlisí,
    féadfaidh tú an liosta iomlán a fháil sa chomhad
    [package.json](https://github.com/sharevb/it-tools/blob/main/package.json)
    den stórlann.

    ## An bhfuair tú fabht? An bhfuil uirlis ar iarraidh?

    Más gá duit uirlis nach bhfuil i láthair anseo faoi láthair, agus má
    cheapann tú go bhféadfadh sí a bheith úsáideach, is féidir leat iarratas gné
    a chur isteach sa [rannán
    saincheisteanna](https://github.com/sharevb/it-tools/issues/new/choose) sa
    stórlann GitHub.

    Agus má fuair tú fabht, nó mura n-oibríonn rud éigin mar a bhíothas ag súil
    leis, comhdaigh tuarascáil fabht sa [rannán
    saincheisteanna](https://github.com/sharevb/it-tools/issues/new/choose) sa
    stórlann GitHub.
