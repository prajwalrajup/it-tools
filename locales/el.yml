      tag-filter-packets-going-to-this-destination-port: Φιλτράρετε τα πακέτα που πηγαίνουν σε αυτήν τη θύρα προορισμού.
      tag-stop-capturing-after-this-number-of-packets: Διακοπή λήψης μετά από αυτόν τον αριθμό πακέτων.
