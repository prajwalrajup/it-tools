        "Dieses Dienstprogramm dient zur Generierung eines tcpdump-Befehls unter
        Verwendung einiger der gängigsten Schalter/Filter von tcpdump. Dieses
        Dienstprogramm umfasst nicht alle Optionen von tcpdump; eine
        vollständige Liste der Optionen finden Sie im Handbuch:"
