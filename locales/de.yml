        pomodoro-timer-0: Pomodoro-Timer
        loading-0: Laden...
    PomodoroAbout:
      text:
        source-wikipedia: "Quelle: Wikipedia"
        once-the-long-break-is-finished-return-to-step-1: Kehren Sie nach der langen Pause zu Schritt 1 zurück.
        keep-repeating-steps-1-3-but-after-your-4th-task-take-a-long-break-instead-of-a-short-break-20-30-minutes-is-common:
          Wiederholen Sie die Schritte 1–3, aber machen Sie nach Ihrer vierten
          Aufgabe eine lange Pause statt einer kurzen (üblich sind 20–30
          Minuten).
        when-the-timer-rings-take-a-short-break-5-10-minutes-is-common:
          Wenn der Timer klingelt, machen Sie eine kurze Pause (5–10 Minuten
          sind üblich).
        work-on-the-task-during-that-time: Arbeiten Sie während dieser Zeit an der Aufgabe.
        decide-on-a-task-and-set-the-timer-25-minutes-is-common: Entscheiden Sie sich
          für eine Aufgabe und stellen Sie den Timer ein (üblich sind 25
          Minuten).
        five-steps-of-the-pomodoro-technique: Fünf Schritte der Pomodoro-Technik
        the-pomodoro-technique-is-a-time-management-method-developed-by-francesco-cirillo-in-the-1980s-it-uses-a-timer-to-break-work-into-intervals-typically-25-minutes-in-length-separated-by-short-breaks-each-interval-is-known-as-a-pomodoro-from-the-italian-word-for-tomato-after-the-tomato-shaped-kitchen-timer-cirillo-used-as-a-university-student:
          Die Pomodoro-Technik ist eine Zeitmanagement-Methode, die Francesco
          Cirillo in den 1980er Jahren entwickelte. Dabei wird ein Timer
          verwendet, um die Arbeit in Intervalle von typischerweise 25 Minuten
          Länge zu unterteilen, die durch kurze Pausen getrennt sind. Jedes
          Intervall wird als Pomodoro bezeichnet, vom italienischen Wort für
          Tomate, benannt nach dem tomatenförmigen Küchentimer, den Cirillo als
          Student verwendete.
        the-pomodoro-technique: Die Pomodoro-Technik
