          RAID 60 yêu cầu ít nhất 8 đĩa, mỗi dải tối thiểu 4 đĩa. Số lượng đĩa
          trong mỗi dải phải bằng nhau.
        raid-60-stripes-multiple-raid-6-arrays-together-raid-6-raid-0-each-raid-6-set-can-sustain-two-drive-failures:
          RAID 60 kết hợp nhiều mảng RAID 6 lại với nhau (RAID 6 + RAID 0). Mỗi
          bộ RAID 6 có thể chịu được hai lỗi ổ đĩa.
        1-drive-failure-per-raid-5-set: 1 ổ đĩa bị lỗi trên mỗi bộ RAID 5
        raid-50-requires-at-least-6-disks-with-3-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          RAID 50 yêu cầu ít nhất 6 đĩa, mỗi dải tối thiểu 3 đĩa. Số lượng đĩa
          trong mỗi dải phải bằng nhau.
        raid-50-stripes-multiple-raid-5-arrays-together-raid-5-raid-0-each-raid-5-set-can-sustain-a-single-drive-failure:
          RAID 50 kết hợp nhiều mảng RAID 5 lại với nhau (RAID 5 + RAID 0). Mỗi
          bộ RAID 5 có thể chịu được lỗi của một ổ đĩa duy nhất.
        1-drive-failure-per-mirrored-set: 1 ổ đĩa bị lỗi trên mỗi bộ được phản chiếu
        raid-10-requires-an-even-number-of-at-least-4-disks: RAID 10 yêu cầu số lượng chẵn ít nhất là 4 đĩa
        raid-10-is-a-stripe-of-mirrors-raid-1-raid-0-each-set-of-drives-is-mirrored-and-striped-together-so-that-each-drive-in-the-set-is-fault-tolerant-within-the-group:
          RAID 10 là một dải các bản sao (RAID 1 + RAID 0). Mỗi bộ ổ đĩa được
          sao chép và phân vùng lại với nhau để mỗi ổ đĩa trong bộ đều có khả
          năng chịu lỗi trong nhóm.
        3-drive-failures: 3 lỗi ổ đĩa
        raid-7-requires-at-least-5-disks: RAID 7 yêu cầu ít nhất 5 đĩa
        raid-7-raid-tp-non-standard-is-similiar-to-raid-5-and-raid-6-but-with-a-third-parity-block-this-allows-for-a-third-disk-failure-at-the-cost-of-storage-reduction-equal-to-three-drives:
          RAID 7/RAID TP (không chuẩn) tương tự như RAID 5 và RAID 6 nhưng có
          khối chẵn lẻ thứ ba. Điều này cho phép ổ đĩa thứ ba bị lỗi với chi phí
          giảm dung lượng lưu trữ tương đương với ba ổ đĩa.
        2-drive-failures: 2 lỗi ổ đĩa
        raid-6-requires-at-least-4-disks: RAID 6 yêu cầu ít nhất 4 đĩa
        raid-6-is-similiar-to-raid-5-but-with-an-additional-parity-block-this-allows-for-an-additional-disk-failure-at-the-cost-of-storage-reduction-equal-to-two-drives:
          RAID 6 tương tự RAID 5 nhưng có thêm khối chẵn lẻ. Điều này cho phép
          xảy ra thêm một lỗi ổ đĩa với chi phí giảm dung lượng lưu trữ tương
          đương với hai ổ đĩa.
        1-drive-failure: Lỗi 1 ổ đĩa
        raid-5-requires-at-least-3-disks: RAID 5 yêu cầu ít nhất 3 đĩa
        raid-5-uses-block-level-striping-with-parity-this-allows-for-fault-tolerance-with-a-storage-reduction-equal-to-one-drive-for-the-parity-information:
          RAID 5 sử dụng phân chia theo khối với tính chẵn lẻ. Điều này cho phép
          khả năng chịu lỗi với dung lượng lưu trữ giảm tương đương một ổ đĩa
          cho thông tin chẵn lẻ.
        raid-1-requires-at-least-1-disk: RAID 1 yêu cầu ít nhất 1 đĩa
        raid-1-consists-of-an-exact-copy-of-the-data-mirror-across-two-or-more-disks-the-array-will-operate-as-long-as-at-least-one-drive-is-operational:
          RAID 1 bao gồm một bản sao chính xác của dữ liệu (bản sao) trên hai
          hoặc nhiều đĩa. Mảng sẽ hoạt động miễn là ít nhất một ổ đĩa còn hoạt
          động.
        raid-0-requires-at-least-1-disk: RAID 0 yêu cầu ít nhất 1 đĩa
        raid-0-splits-data-evenly-across-2-or-more-disks-without-redunancy-or-fault-tolerance-creating-one-large-storage-space:
          RAID 0 chia dữ liệu đều trên 2 hoặc nhiều đĩa mà không cần dự phòng
          hoặc chịu lỗi, tạo ra một không gian lưu trữ lớn.
