      label-raid-50-parity-stripe: RAID 50 (التكافؤ + الشريط)
      label-raid-60-double-parity-stripe: RAID 60 (تكافؤ مزدوج + شريط)
      label-raid-70-triple-parity-stripe: RAID 70 (التكافؤ الثلاثي + الشريط)
      label-number-of-disks: عدد الأقراص
      placeholder-number-of-disks-ex-2: "عدد الأقراص (مثال: 2)"
      label-disk-size: حجم القرص
      placeholder-disk-size-ex-100: "حجم القرص (مثال: 100)"
      label-disks-per-stripe: الأقراص لكل شريط
      placeholder-number-of-disks-per-stripe-ex-3: "عدد الأقراص لكل شريط (على سبيل المثال: 3)"
      label-raid-type: نوع RAID
      title-results: نتائج
      tag-for-more-information-on-raid-types-see: لمزيد من المعلومات حول أنواع RAID، راجع
      tag-wikipedia: ويكيبيديا
      tag-: .
      tag-capacity: سعة
      tag-fault-tolerance: التسامح مع الأخطاء
      tag-space-efficiency: كفاءة المساحة
    text:
      num-1-drive-failures: فشل محرك الأقراص {0}
    service:
      text:
        3-drive-failures-per-raid-7-set: 3 حالات فشل في محرك الأقراص لكل مجموعة RAID 7
        raid-70-requires-at-least-10-disks-with-5-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          يتطلب RAID 70 ما لا يقل عن 10 أقراص، بحد أدنى 5 أقراص لكل شريط. يجب أن
          تحتوي الشرائط على عدد متساوٍ من الأقراص.
        raid-70-stripes-multiple-raid-7-arrays-together-raid-7-raid-0-each-raid-7-set-can-sustain-three-drive-failures:
          يجمع RAID 70 عدة مجموعات RAID 7 معًا (RAID 7 + RAID 0). كل مجموعة RAID
          7 قادرة على تحمل ثلاثة أعطال في محركات الأقراص.
        2-drive-failures-per-raid-6-set: فشل محركين لكل مجموعة RAID 6
        raid-60-requires-at-least-8-disks-with-4-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          يتطلب RAID 60 ثمانية أقراص على الأقل، بحد أدنى أربعة أقراص لكل شريط.
          يجب أن تحتوي كل شريط على عدد متساوٍ من الأقراص.
        raid-60-stripes-multiple-raid-6-arrays-together-raid-6-raid-0-each-raid-6-set-can-sustain-two-drive-failures:
          يجمع RAID 60 عدة مجموعات RAID 6 معًا (RAID 6 + RAID 0). كل مجموعة RAID
          6 قادرة على تحمل فشل محركي أقراص.
        1-drive-failure-per-raid-5-set: فشل محرك أقراص واحد لكل مجموعة RAID 5
        raid-50-requires-at-least-6-disks-with-3-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          يتطلب RAID 50 ستة أقراص على الأقل، بحد أدنى ثلاثة أقراص لكل شريط. يجب
          أن تحتوي كل شريط على عدد متساوٍ من الأقراص.
        raid-50-stripes-multiple-raid-5-arrays-together-raid-5-raid-0-each-raid-5-set-can-sustain-a-single-drive-failure:
          يجمع RAID 50 عدة مجموعات RAID 5 معًا (RAID 5 + RAID 0). يمكن لكل
          مجموعة RAID 5 تحمل فشل محرك أقراص واحد.
        1-drive-failure-per-mirrored-set: فشل محرك أقراص واحد لكل مجموعة متطابقة
        raid-10-requires-an-even-number-of-at-least-4-disks: يتطلب RAID 10 عددًا زوجيًا من الأقراص يصل إلى 4 على الأقل
        raid-10-is-a-stripe-of-mirrors-raid-1-raid-0-each-set-of-drives-is-mirrored-and-striped-together-so-that-each-drive-in-the-set-is-fault-tolerant-within-the-group:
          RAID 10 عبارة عن شريط من المرايا (RAID 1 + RAID 0). كل مجموعة من
          محركات الأقراص تُعكس وتُربط معًا، بحيث يكون كل محرك أقراص في المجموعة
          مقاومًا للأخطاء داخل المجموعة.
        3-drive-failures: 3 أعطال في محرك الأقراص
        raid-7-requires-at-least-5-disks: يتطلب RAID 7 خمسة أقراص على الأقل
        raid-7-raid-tp-non-standard-is-similiar-to-raid-5-and-raid-6-but-with-a-third-parity-block-this-allows-for-a-third-disk-failure-at-the-cost-of-storage-reduction-equal-to-three-drives:
          يُشبه RAID 7/RAID TP (غير القياسي) RAID 5 وRAID 6، ولكن مع كتلة تكافؤ
          ثالثة. يسمح هذا بفشل قرص ثالث على حساب تقليل مساحة التخزين بما يعادل
          ثلاثة محركات أقراص.
        2-drive-failures: فشل محركين
        raid-6-requires-at-least-4-disks: يتطلب RAID 6 أربعة أقراص على الأقل
        raid-6-is-similiar-to-raid-5-but-with-an-additional-parity-block-this-allows-for-an-additional-disk-failure-at-the-cost-of-storage-reduction-equal-to-two-drives:
          يُشبه RAID 6 RAID 5، ولكن مع كتلة تكافؤ إضافية. يسمح هذا بفشل إضافي
          للقرص، مما يُقلل مساحة التخزين بما يعادل محركي أقراص.
        1-drive-failure: فشل محرك الأقراص 1
        raid-5-requires-at-least-3-disks: يتطلب RAID 5 ثلاثة أقراص على الأقل
        raid-5-uses-block-level-striping-with-parity-this-allows-for-fault-tolerance-with-a-storage-reduction-equal-to-one-drive-for-the-parity-information:
          يستخدم RAID 5 تقسيمًا على مستوى الكتلة مع التكافؤ. يتيح هذا تحمّل
          الأخطاء مع تقليل مساحة التخزين بمقدار محرك أقراص واحد لمعلومات
          التكافؤ.
        raid-1-requires-at-least-1-disk: يتطلب RAID 1 قرصًا واحدًا على الأقل
        raid-1-consists-of-an-exact-copy-of-the-data-mirror-across-two-or-more-disks-the-array-will-operate-as-long-as-at-least-one-drive-is-operational:
          يتكون RAID 1 من نسخة طبق الأصل من البيانات (مرآة) على قرصين أو أكثر.
          ستعمل المصفوفة طالما كان أحد الأقراص على الأقل قيد التشغيل.
        raid-0-requires-at-least-1-disk: يتطلب RAID 0 قرصًا واحدًا على الأقل
        raid-0-splits-data-evenly-across-2-or-more-disks-without-redunancy-or-fault-tolerance-creating-one-large-storage-space:
          يقوم RAID 0 بتقسيم البيانات بالتساوي عبر قرصين أو أكثر دون التكرار أو
          التسامح مع الأخطاء مما يؤدي إلى إنشاء مساحة تخزين كبيرة واحدة.
