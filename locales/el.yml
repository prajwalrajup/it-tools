      tag-space-efficiency: Αποδοτικότητα χώρου
    text:
      num-1-drive-failures: "{0} βλάβες μονάδας δίσκου"
    service:
      text:
        3-drive-failures-per-raid-7-set: 3 βλάβες μονάδας δίσκου ανά σετ RAID 7
        raid-70-requires-at-least-10-disks-with-5-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          Το RAID 70 απαιτεί τουλάχιστον 10 δίσκους με ελάχιστο αριθμό 5 ανά
          λωρίδα. Οι λωρίδες πρέπει να περιέχουν ίσο αριθμό δίσκων.
        raid-70-stripes-multiple-raid-7-arrays-together-raid-7-raid-0-each-raid-7-set-can-sustain-three-drive-failures:
          Το RAID 70 συνδέει πολλαπλές συστοιχίες RAID 7 μαζί (RAID 7 + RAID 0).
          Κάθε σύνολο RAID 7 μπορεί να αντέξει τρεις βλάβες μονάδας δίσκου.
        2-drive-failures-per-raid-6-set: 2 βλάβες μονάδας δίσκου ανά σετ RAID 6
        raid-60-requires-at-least-8-disks-with-4-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          Το RAID 60 απαιτεί τουλάχιστον 8 δίσκους, με ελάχιστο αριθμό 4 ανά
          stripe. Οι stripes πρέπει να περιέχουν ίσο αριθμό δίσκων.
        raid-60-stripes-multiple-raid-6-arrays-together-raid-6-raid-0-each-raid-6-set-can-sustain-two-drive-failures:
          Το RAID 60 συνδέει πολλαπλές συστοιχίες RAID 6 μαζί (RAID 6 + RAID 0).
          Κάθε σύνολο RAID 6 μπορεί να αντέξει δύο βλάβες μονάδας δίσκου.
        1-drive-failure-per-raid-5-set: 1 βλάβη μονάδας δίσκου ανά σετ RAID 5
        raid-50-requires-at-least-6-disks-with-3-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          Το RAID 50 απαιτεί τουλάχιστον 6 δίσκους, με ελάχιστο 3 ανά stripe. Οι
          stripes πρέπει να περιέχουν ίσο αριθμό δίσκων.
        raid-50-stripes-multiple-raid-5-arrays-together-raid-5-raid-0-each-raid-5-set-can-sustain-a-single-drive-failure:
          Το RAID 50 συνδέει πολλαπλές συστοιχίες RAID 5 μαζί (RAID 5 + RAID 0).
          Κάθε σύνολο RAID 5 μπορεί να υποστεί βλάβη σε μία μόνο μονάδα δίσκου.
        1-drive-failure-per-mirrored-set: 1 βλάβη μονάδας δίσκου ανά σετ κατοπτρισμού
        raid-10-requires-an-even-number-of-at-least-4-disks: Το RAID 10 απαιτεί άρτιο αριθμό τουλάχιστον 4 δίσκων
        raid-10-is-a-stripe-of-mirrors-raid-1-raid-0-each-set-of-drives-is-mirrored-and-striped-together-so-that-each-drive-in-the-set-is-fault-tolerant-within-the-group:
          Το RAID 10 είναι μια λωρίδα κατοπτρισμών (RAID 1 + RAID 0). Κάθε
          σύνολο μονάδων δίσκου είναι κατοπτριζόμενο και διαγραμμισμένο, έτσι
          ώστε κάθε μονάδα δίσκου στο σύνολο να είναι ανεκτική σε σφάλματα εντός
          της ομάδας.
        3-drive-failures: 3 βλάβες μονάδας δίσκου
        raid-7-requires-at-least-5-disks: Το RAID 7 απαιτεί τουλάχιστον 5 δίσκους
        raid-7-raid-tp-non-standard-is-similiar-to-raid-5-and-raid-6-but-with-a-third-parity-block-this-allows-for-a-third-disk-failure-at-the-cost-of-storage-reduction-equal-to-three-drives:
          Το RAID 7/RAID TP (μη τυπικό) είναι παρόμοιο με το RAID 5 και το RAID
          6 αλλά με ένα τρίτο μπλοκ ισοτιμίας. Αυτό επιτρέπει την αστοχία ενός
          τρίτου δίσκου με κόστος μείωσης χώρου αποθήκευσης ίσο με τρεις μονάδες
          δίσκου.
        2-drive-failures: 2 βλάβες μονάδας δίσκου
        raid-6-requires-at-least-4-disks: Το RAID 6 απαιτεί τουλάχιστον 4 δίσκους
        raid-6-is-similiar-to-raid-5-but-with-an-additional-parity-block-this-allows-for-an-additional-disk-failure-at-the-cost-of-storage-reduction-equal-to-two-drives:
          Το RAID 6 είναι παρόμοιο με το RAID 5 αλλά με ένα επιπλέον μπλοκ
          ισοτιμίας. Αυτό επιτρέπει μια επιπλέον βλάβη δίσκου με κόστος μείωσης
          χώρου αποθήκευσης ίσο με δύο μονάδες δίσκου.
        1-drive-failure: 1 βλάβη μονάδας δίσκου
        raid-5-requires-at-least-3-disks: Το RAID 5 απαιτεί τουλάχιστον 3 δίσκους
        raid-5-uses-block-level-striping-with-parity-this-allows-for-fault-tolerance-with-a-storage-reduction-equal-to-one-drive-for-the-parity-information:
          Το RAID 5 χρησιμοποιεί διαγράμμιση σε επίπεδο μπλοκ με ισοτιμία. Αυτό
          επιτρέπει ανοχή σφαλμάτων με μείωση χώρου αποθήκευσης ίση με μία
          μονάδα δίσκου για τις πληροφορίες ισοτιμίας.
        raid-1-requires-at-least-1-disk: Το RAID 1 απαιτεί τουλάχιστον 1 δίσκο
        raid-1-consists-of-an-exact-copy-of-the-data-mirror-across-two-or-more-disks-the-array-will-operate-as-long-as-at-least-one-drive-is-operational:
          Το RAID 1 αποτελείται από ένα ακριβές αντίγραφο των δεδομένων (mirror)
          σε δύο ή περισσότερους δίσκους. Ο πίνακας θα λειτουργεί εφόσον
          τουλάχιστον μία μονάδα δίσκου είναι λειτουργική.
        raid-0-requires-at-least-1-disk: Το RAID 0 απαιτεί τουλάχιστον 1 δίσκο
        raid-0-splits-data-evenly-across-2-or-more-disks-without-redunancy-or-fault-tolerance-creating-one-large-storage-space:
          Το RAID 0 διαιρεί τα δεδομένα ομοιόμορφα σε 2 ή περισσότερους δίσκους
          χωρίς πλεονασμό ή ανοχή σφαλμάτων, δημιουργώντας έναν μεγάλο χώρο
          αποθήκευσης.
