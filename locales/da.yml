    service:
      text:
        3-drive-failures-per-raid-7-set: 3 drevfejl pr. RAID 7-sæt
        raid-70-requires-at-least-10-disks-with-5-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          RAID 70 kræver mindst 10 diske med minimum 5 pr. stripe. Stripes skal
          indeholde et lige antal diske.
        raid-70-stripes-multiple-raid-7-arrays-together-raid-7-raid-0-each-raid-7-set-can-sustain-three-drive-failures:
          RAID 70 striperer flere RAID 7-arrays sammen (RAID 7 + RAID 0). Hvert
          RAID 7-sæt kan modstå tre drevfejl.
        2-drive-failures-per-raid-6-set: 2 drevfejl pr. RAID 6-sæt
        raid-60-requires-at-least-8-disks-with-4-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          RAID 60 kræver mindst 8 diske med minimum 4 pr. stripe. Stripes skal
          indeholde et lige antal diske.
        raid-60-stripes-multiple-raid-6-arrays-together-raid-6-raid-0-each-raid-6-set-can-sustain-two-drive-failures:
          RAID 60 forbinder flere RAID 6-arrays (RAID 6 + RAID 0). Hvert RAID
          6-sæt kan modstå to drevfejl.
        1-drive-failure-per-raid-5-set: 1 drevfejl pr. RAID 5-sæt
        raid-50-requires-at-least-6-disks-with-3-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          RAID 50 kræver mindst 6 diske med minimum 3 pr. stripe. Stripes skal
          indeholde et lige antal diske.
        raid-50-stripes-multiple-raid-5-arrays-together-raid-5-raid-0-each-raid-5-set-can-sustain-a-single-drive-failure:
          RAID 50 striperer flere RAID 5-arrays sammen (RAID 5 + RAID 0). Hvert
          RAID 5-sæt kan modstå en enkelt diskfejl.
        1-drive-failure-per-mirrored-set: 1 drevfejl pr. spejlet sæt
        raid-10-requires-an-even-number-of-at-least-4-disks: RAID 10 kræver et lige antal diske på mindst 4
        raid-10-is-a-stripe-of-mirrors-raid-1-raid-0-each-set-of-drives-is-mirrored-and-striped-together-so-that-each-drive-in-the-set-is-fault-tolerant-within-the-group:
          RAID 10 er en stribe af spejle (RAID 1 + RAID 0). Hvert sæt drev er
          spejlet og stribet sammen, så hvert drev i sættet er fejltolerant
          inden for gruppen.
        3-drive-failures: 3 drevfejl
        raid-7-requires-at-least-5-disks: RAID 7 kræver mindst 5 diske
        raid-7-raid-tp-non-standard-is-similiar-to-raid-5-and-raid-6-but-with-a-third-parity-block-this-allows-for-a-third-disk-failure-at-the-cost-of-storage-reduction-equal-to-three-drives:
          RAID 7/RAID TP (ikke-standard) ligner RAID 5 og RAID 6, men med en
          tredje paritetsblok. Dette muliggør en tredje diskfejl på bekostning
          af en lagerreduktion svarende til tre drev.
        2-drive-failures: 2 drevfejl
        raid-6-requires-at-least-4-disks: RAID 6 kræver mindst 4 diske
        raid-6-is-similiar-to-raid-5-but-with-an-additional-parity-block-this-allows-for-an-additional-disk-failure-at-the-cost-of-storage-reduction-equal-to-two-drives:
          RAID 6 minder om RAID 5, men med en ekstra paritetsblok. Dette giver
          mulighed for en yderligere diskfejl på bekostning af en reduktion af
          lagerplads svarende til to drev.
        1-drive-failure: 1 drevfejl
        raid-5-requires-at-least-3-disks: RAID 5 kræver mindst 3 diske
        raid-5-uses-block-level-striping-with-parity-this-allows-for-fault-tolerance-with-a-storage-reduction-equal-to-one-drive-for-the-parity-information:
          RAID 5 bruger blokniveaustriping med paritet. Dette giver mulighed for
          fejltolerance med en lagerreduktion svarende til ét drev for
          paritetsinformationen.
        raid-1-requires-at-least-1-disk: RAID 1 kræver mindst 1 disk
        raid-1-consists-of-an-exact-copy-of-the-data-mirror-across-two-or-more-disks-the-array-will-operate-as-long-as-at-least-one-drive-is-operational:
          RAID 1 består af en nøjagtig kopi af dataene (spejling) på tværs af to
          eller flere diske. Arrayet vil fungere, så længe mindst ét drev er
          funktionsdygtigt.
        raid-0-requires-at-least-1-disk: RAID 0 kræver mindst 1 disk
        raid-0-splits-data-evenly-across-2-or-more-disks-without-redunancy-or-fault-tolerance-creating-one-large-storage-space:
          RAID 0 opdeler data jævnt på tværs af 2 eller flere diske uden
          redundans eller fejltolerance, hvilket skaber én stor lagerplads.
