  content-fork: >
    # Про IT-інструменти

    Цей чудовий веб-сайт, створений за допомогою ❤ спочатку [Corentin
    Thomasset](https://corentin.tech?utm_source=it-tools&utm_medium=about) та
    розширений ShareVB, об'єднує корисні інструменти для розробників та людей,
    які працюють у сфері IT. Якщо ви вважаєте його корисним, будь ласка, не
    соромтеся поділитися ним з людьми, які, на вашу думку, також можуть його
    знайти корисним, і не забудьте додати його до закладок на панелі швидкого
    доступу!

    IT-інструменти є програмним забезпеченням з відкритим вихідним кодом (під
    ліцензією GPL-3.0) та безкоштовним, і завжди буде таким. Якщо ви хочете
    підтримати мою роботу над цим форком та заохотити мене додавати більше
    інструментів або функцій, будь ласка, розгляньте можливість підтримки,
    [підтримавши мене](https://www.buymeacoffee.com/sharevb).

    ## Технології

    IT-інструменти створені на Vue.js (Vue 3) з бібліотекою компонентів Naive UI
    та розміщені та постійно розгортаються Vercel. У деяких інструментах
    використовуються сторонні бібліотеки з відкритим кодом. Повний список можна
    знайти у файлі
    [package.json](https://github.com/sharevb/it-tools/blob/main/package.json)
    репозиторію.

    ## Знайшли помилку? Інструмент відсутній?

    Якщо вам потрібен інструмент, якого наразі тут немає, і ви вважаєте, що він
    може бути корисним, ви можете надіслати запит на функцію в розділі
    [issues](https://github.com/sharevb/it-tools/issues/new/choose) у
    репозиторії GitHub.

    А якщо ви знайшли помилку або щось працює не так, як очікувалося, будь
    ласка, надішліть звіт про помилку в розділі
    [issues](https://github.com/sharevb/it-tools/issues/new/choose) у
    репозиторії GitHub.
