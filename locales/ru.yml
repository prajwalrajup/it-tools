      title-mttdl-failure-probability-calculator: Калькулятор MTTDL и вероятности отказа
      label-raid-level: "Уровень RAID:"
      placeholder-select-raid-level: Выберите уровень RAID
      label-number-of-drives: "Количество дисков:"
      label-drive-mtbf-hours: "Среднее время безотказной работы (часов):"
      label-rebuild-time-hours: "Время восстановления (часы):"
      label-bit-error-rate-ber-in-1ex: "Коэффициент битовых ошибок (BER в 1eX):"
      label-drive-capacity-tb: "Емкость диска (ТБ):"
      label-years-for-failure-probability: "Лет вероятности отказа:"
      label-mttdl-hours: "MTTDL (часы):"
      label-mttdl-years: "MTTDL (лет):"
      label-failure-probability: "Вероятность отказа:"
      tag-key-terms-explained: 🧠 Объяснение ключевых терминов
      tag-raid-level: Уровень RAID
      tag-raid-redundant-array-of-independent-disks-is-a-method-of-combining-multiple-physical-drives-into-one-logical-unit-to-improve-performance-redundancy-or-both:
        RAID (избыточный массив независимых дисков) — это метод объединения
        нескольких физических дисков в одну логическую единицу для повышения
        производительности, избыточности или и того, и другого.
      tag-description: Описание
      tag-raid-0: RAID 0
      tag-striping-only-no-redundancy-fast-but-risky-if-one-drive-fails-all-data-is-lost:
        Только чередование. Без избыточности. Быстро, но рискованно — если один
        диск выйдет из строя, все данные будут потеряны.
      tag-raid-1: RAID 1
      tag-mirroring-data-is-duplicated-across-drives-high-redundancy-low-capacity-efficiency:
        Зеркальное копирование. Данные дублируются на всех дисках. Высокая
        избыточность, низкая эффективность использования емкости.
      tag-raid-5: RAID 5
      tag-striping-with-parity-can-tolerate-one-drive-failure-balanced-speed-and-redundancy:
        Чередование с контролем четности. Допускает отказ одного диска.
        Сбалансированная скорость и избыточность.
      tag-raid-6: RAID 6
      tag-double-parity-can-survive-two-drive-failures: Двойная чётность. Может выдержать два отказа дисков.
      tag-raid-10: RAID 10
      tag-mirrored-pairs-striped-together-high-performance-and-redundancy:
        Зеркальные пары, объединенные в чередование. Высокая производительность
        и избыточность.
      tag-raid-z1-z2-z3: RAID-Z1/Z2/Z3
      tag-zfs-based-raid-levels-with-single-double-or-triple-parity-designed-for-data-integrity:
        Уровни RAID на базе ZFS с одинарной, двойной или тройной четностью.
        Разработаны для обеспечения целостности данных.
      tag-raid-50: RAID 50
      tag-stripe-of-raid-5-arrays-combines-performance-of-raid-0-with-redundancy-of-raid-5:
        Чередование массивов RAID 5. Сочетает производительность RAID 0 с
        избыточностью RAID 5.
      tag-️-mtbf-mean-time-between-failures: ⏱️ MTBF (среднее время наработки на отказ)
      tag-the-average-time-in-hours-a-drive-is-expected-to-operate-before-failing-higher-mtbf-means-more-reliable-hardware:
        Среднее ожидаемое время работы накопителя (в часах) до выхода из строя.
        Чем выше среднее время безотказной работы, тем надёжнее оборудование.
      tag-rebuild-time: 🔁 Время перестройки
      tag-the-time-required-to-reconstruct-data-on-a-replacement-drive-after-a-failure-longer-rebuild-times-increase-the-risk-of-a-second-failure-during-recovery:
        Время, необходимое для восстановления данных на новом диске после сбоя.
        Более длительное время восстановления увеличивает риск повторного сбоя
        во время восстановления.
      tag-mttdl-mean-time-to-data-loss: 📉 MTTDL (среднее время до потери данных)
      tag-a-statistical-estimate-of-how-long-a-raid-system-can-operate-before-data-loss-occurs-it-considers-drive-failures-rebuild-time-and-raid-redundancy-higher-mttdl-means-a-safer-system:
        Статистическая оценка срока службы RAID-системы до потери данных. Она
        учитывает отказы дисков, время восстановления и избыточность RAID. Чем
        выше MTTDL, тем безопаснее система.
      tag-bit-error-rate-ber: 🧮 Коэффициент битовых ошибок (BER)
      tag-the-probability-that-a-bit-read-from-a-disk-will-be-incorrect-due-to-hardware-limitations-even-tiny-bers-like-1-in-a-trillion-can-cause-issues-during-rebuilds-especially-with-large-drives:
        Вероятность того, что бит, прочитанный с диска, окажется некорректным
        из-за аппаратных ограничений. Даже мизерные значения BER (например, 1 на
        триллион) могут вызвать проблемы при восстановлении, особенно на больших
        дисках.
      tag-unrecoverable-read-error-ure: 🧠 Неисправимая ошибка чтения (URE)
      tag-occurs-when-a-drive-fails-to-read-a-sector-during-rebuild-ber-contributes-to-ure-risk-which-can-compromise-raid-recovery:
        Происходит, когда диску не удаётся прочитать сектор во время
        восстановления. BER повышает риск URE, что может поставить под угрозу
        восстановление RAID.
      tag-drive-capacity-tb: 📦 Емкость диска (ТБ)
      tag-total-storage-per-drive-larger-drives-take-longer-to-rebuild-and-are-more-susceptible-to-ber-related-errors:
        Общий объём хранилища на диске. Диски большего объёма требуют больше
        времени на восстановление и более подвержены ошибкам, связанным с BER.
      tag-failure-probability: 📈 Вероятность отказа
      tag-the-chance-that-the-raid-system-will-experience-data-loss-over-a-given-time-period-e-g-5-years-calculated-using-mttdl-and-exponential-failure-models:
        Вероятность потери данных в RAID-системе в течение заданного периода
        времени (например, 5 лет). Рассчитывается с использованием MTTDL и
        экспоненциальной модели отказов.
