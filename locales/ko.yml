about:
  alltools-title: 모든 {toolsCount}개 도구
  tools:
    name: 이름
    desc: 설명
    category: 범주
  content-fork: >
    # IT-Tools 소개

    [Corentin
    Thomasset](https://corentin.tech?utm_source=it-tools&utm_medium=about)이 ❤의
    마음으로 제작하고 ShareVB로 확장한 이 멋진 웹사이트는 개발자와 IT 종사자를 위한 유용한 도구들을 모아놓았습니다. 유용하다고
    생각되시면, 유용할 것 같은 다른 사람들과 공유해 주시고, 바로가기 모음에 북마크하는 것도 잊지 마세요!

    IT Tools는 오픈 소스(GPL-3.0 라이선스)이며 무료이며, 앞으로도 계속 무료입니다. 이 포크에서 제 작업을 후원하고 더 많은
    도구나 기능을 추가하도록 격려해 주시고 싶으시다면 [후원](https://www.buymeacoffee.com/sharevb)을 통해
    후원해 주세요.

    ## 기술

    IT Tools는 Naive UI 컴포넌트 라이브러리를 사용하여 Vue.js(Vue 3)로 제작되었으며, Vercel에서 호스팅 및
    지속적으로 배포됩니다. 일부 도구에는 타사 오픈소스 라이브러리가 사용되며, 전체 목록은 저장소의
    [package.json](https://github.com/sharevb/it-tools/blob/main/package.json)
    파일에서 확인할 수 있습니다.

    ## 버그를 발견하셨나요? 도구가 누락되었나요?

    현재 여기에 없는 도구가 필요하고 유용하다고 생각되시면 GitHub 저장소의 [문제
    섹션](https://github.com/sharevb/it-tools/issues/new/choose)에 기능 요청을 제출해 주세요.

    버그를 발견했거나 예상대로 작동하지 않는 경우 GitHub 저장소의 [문제
    섹션](https://github.com/sharevb/it-tools/issues/new/choose)에 버그 보고서를 제출해 주세요.
