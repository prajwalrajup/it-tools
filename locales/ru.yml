        loading-0: Загрузка...
    PomodoroAbout:
      text:
        source-wikipedia: "Источник: Википедия"
        once-the-long-break-is-finished-return-to-step-1: После окончания длительного перерыва вернитесь к шагу 1.
        keep-repeating-steps-1-3-but-after-your-4th-task-take-a-long-break-instead-of-a-short-break-20-30-minutes-is-common:
          Продолжайте повторять шаги 1–3, но после четвертой задачи сделайте
          длительный перерыв вместо короткого (обычно 20–30 минут).
        when-the-timer-rings-take-a-short-break-5-10-minutes-is-common: Когда таймер зазвонит, сделайте небольшой перерыв (обычно 5–10 минут).
        work-on-the-task-during-that-time: Работайте над задачей в течение этого времени.
        decide-on-a-task-and-set-the-timer-25-minutes-is-common: Определитесь с задачей и установите таймер (обычно 25 минут).
        five-steps-of-the-pomodoro-technique: Пять шагов метода Помодоро
        the-pomodoro-technique-is-a-time-management-method-developed-by-francesco-cirillo-in-the-1980s-it-uses-a-timer-to-break-work-into-intervals-typically-25-minutes-in-length-separated-by-short-breaks-each-interval-is-known-as-a-pomodoro-from-the-italian-word-for-tomato-after-the-tomato-shaped-kitchen-timer-cirillo-used-as-a-university-student:
          Метод «Помодоро» — это метод управления временем, разработанный
          Франческо Чирилло в 1980-х годах. Он использует таймер для разбиения
          работы на интервалы, обычно продолжительностью 25 минут, разделенные
          короткими перерывами. Каждый интервал называется «помидором» (от
          итальянского слова «помидор»), которое Чирилло использовал в качестве
          кухонного таймера в форме помидора, будучи студентом университета.
        the-pomodoro-technique: Метод Помидора
