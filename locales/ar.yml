  pomodoro-timer:
    title: مؤقت بومودورو
    description: مؤقت بومودورو الأساسي
    texts:
      tag-import-pomodoroapp-from-app-pomodoroapp-vue: استيراد PomodoroApp من &#39;./app/PomodoroApp.vue&#39;؛
    SplashScreen:
      text:
        pomodoro-timer-0: مؤقت بومودورو
        loading-0: تحميل...
    PomodoroAbout:
      text:
        source-wikipedia: "المصدر: ويكيبيديا"
        once-the-long-break-is-finished-return-to-step-1: بمجرد انتهاء الاستراحة الطويلة، عد إلى الخطوة 1.
        keep-repeating-steps-1-3-but-after-your-4th-task-take-a-long-break-instead-of-a-short-break-20-30-minutes-is-common:
          استمر في تكرار الخطوات من 1 إلى 3، ولكن بعد مهمتك الرابعة، خذ استراحة
          طويلة بدلاً من استراحة قصيرة (20-30 دقيقة أمر شائع).
        when-the-timer-rings-take-a-short-break-5-10-minutes-is-common: عندما يرن المنبه، خذ استراحة قصيرة (عادةً ما تكون من 5 إلى 10 دقائق).
        work-on-the-task-during-that-time: العمل على المهمة خلال ذلك الوقت.
        decide-on-a-task-and-set-the-timer-25-minutes-is-common: حدد مهمة ما واضبط المؤقت (25 دقيقة في العادة).
        five-steps-of-the-pomodoro-technique: خمس خطوات لتقنية بومودورو
        the-pomodoro-technique-is-a-time-management-method-developed-by-francesco-cirillo-in-the-1980s-it-uses-a-timer-to-break-work-into-intervals-typically-25-minutes-in-length-separated-by-short-breaks-each-interval-is-known-as-a-pomodoro-from-the-italian-word-for-tomato-after-the-tomato-shaped-kitchen-timer-cirillo-used-as-a-university-student:
          تقنية بومودورو هي أسلوب لإدارة الوقت طوره فرانشيسكو سيريلو في
          ثمانينيات القرن الماضي. تستخدم هذه التقنية مؤقتًا لتقسيم العمل إلى
          فترات، عادةً ما تكون مدتها 25 دقيقة، تفصل بينها فترات راحة قصيرة.
          تُعرف كل فترة باسم بومودورو، وهي كلمة إيطالية تعني طماطم، نسبةً إلى
          مؤقت المطبخ على شكل طماطم الذي استخدمه سيريلو عندما كان طالبًا
          جامعيًا.
        the-pomodoro-technique: تقنية بومودورو
