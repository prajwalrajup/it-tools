  pomodoro-timer:
    title: Χρονοδιακόπτης Pomodoro
    description: Βασικός χρονοδιακόπτης Pomodoro
    texts:
      tag-import-pomodoroapp-from-app-pomodoroapp-vue: εισαγωγή του PomodoroApp από το './app/PomodoroApp.vue';
    SplashScreen:
      text:
        pomodoro-timer-0: Χρονοδιακόπτης Pomodoro
        loading-0: Φόρτωση...
    PomodoroAbout:
      text:
        source-wikipedia: "Πηγή: Wikipedia"
        once-the-long-break-is-finished-return-to-step-1: Μόλις τελειώσει το μεγάλο διάλειμμα, επιστρέψτε στο Βήμα 1.
        keep-repeating-steps-1-3-but-after-your-4th-task-take-a-long-break-instead-of-a-short-break-20-30-minutes-is-common:
          Συνεχίστε να επαναλαμβάνετε τα βήματα 1-3, αλλά μετά την 4η εργασία
          σας, κάντε ένα μεγάλο διάλειμμα αντί για ένα σύντομο διάλειμμα
          (συνήθως 20-30 λεπτά).
        when-the-timer-rings-take-a-short-break-5-10-minutes-is-common:
          Όταν χτυπήσει το χρονόμετρο, κάντε ένα σύντομο διάλειμμα (5-10 λεπτά
          είναι το συνηθισμένο).
        work-on-the-task-during-that-time: Δουλέψτε πάνω στην εργασία κατά τη διάρκεια αυτού του χρόνου.
        decide-on-a-task-and-set-the-timer-25-minutes-is-common: Αποφασίστε για μια
          εργασία και ρυθμίστε το χρονόμετρο (συνήθως 25 λεπτά).
        five-steps-of-the-pomodoro-technique: Πέντε βήματα της τεχνικής Pomodoro
        the-pomodoro-technique-is-a-time-management-method-developed-by-francesco-cirillo-in-the-1980s-it-uses-a-timer-to-break-work-into-intervals-typically-25-minutes-in-length-separated-by-short-breaks-each-interval-is-known-as-a-pomodoro-from-the-italian-word-for-tomato-after-the-tomato-shaped-kitchen-timer-cirillo-used-as-a-university-student:
          Η Τεχνική Pomodoro είναι μια μέθοδος διαχείρισης χρόνου που
          αναπτύχθηκε από τον Francesco Cirillo τη δεκαετία του 1980.
          Χρησιμοποιεί ένα χρονόμετρο για να χωρίσει την εργασία σε διαστήματα,
          συνήθως 25 λεπτών, χωρισμένα από σύντομα διαλείμματα. Κάθε διάστημα
          είναι γνωστό ως pomodoro, από την ιταλική λέξη για την ντομάτα, από το
          χρονόμετρο κουζίνας σε σχήμα ντομάτας που χρησιμοποιούσε ο Cirillo ως
          φοιτητής στο πανεπιστήμιο.
