      tag-fault-tolerance: Fehlertoleranz
      tag-space-efficiency: Platzeffizienz
    text:
      num-1-drive-failures: "{0} Laufwerksfehler"
    service:
      text:
        3-drive-failures-per-raid-7-set: 3 Laufwerksausfälle pro RAID 7-Set
        raid-70-requires-at-least-10-disks-with-5-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          RAID 70 erfordert mindestens 10 Festplatten, davon mindestens 5 pro
          Stripe. Die Stripes müssen die gleiche Anzahl an Festplatten
          enthalten.
        raid-70-stripes-multiple-raid-7-arrays-together-raid-7-raid-0-each-raid-7-set-can-sustain-three-drive-failures:
          RAID 70 kombiniert mehrere RAID 7-Arrays (RAID 7 + RAID 0). Jedes RAID
          7-Set kann drei Laufwerksausfälle verkraften.
        2-drive-failures-per-raid-6-set: 2 Laufwerksausfälle pro RAID 6-Set
        raid-60-requires-at-least-8-disks-with-4-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          RAID 60 erfordert mindestens 8 Festplatten, davon mindestens 4 pro
          Stripe. Die Stripes müssen die gleiche Anzahl an Festplatten
          enthalten.
        raid-60-stripes-multiple-raid-6-arrays-together-raid-6-raid-0-each-raid-6-set-can-sustain-two-drive-failures:
          RAID 60 kombiniert mehrere RAID 6-Arrays (RAID 6 + RAID 0). Jedes RAID
          6-Set kann zwei Laufwerksausfälle verkraften.
        1-drive-failure-per-raid-5-set: 1 Laufwerksfehler pro RAID 5-Set
        raid-50-requires-at-least-6-disks-with-3-minimum-per-stripe-stripes-must-contain-an-equal-number-of-disks:
          RAID 50 erfordert mindestens 6 Festplatten, davon mindestens 3 pro
          Stripe. Die Stripes müssen die gleiche Anzahl an Festplatten
          enthalten.
        raid-50-stripes-multiple-raid-5-arrays-together-raid-5-raid-0-each-raid-5-set-can-sustain-a-single-drive-failure:
          RAID 50 kombiniert mehrere RAID 5-Arrays (RAID 5 + RAID 0). Jedes RAID
          5-Set kann einen einzelnen Laufwerksausfall verkraften.
        1-drive-failure-per-mirrored-set: 1 Laufwerksausfall pro gespiegeltem Satz
        raid-10-requires-an-even-number-of-at-least-4-disks: RAID 10 erfordert eine gerade Anzahl von mindestens 4 Festplatten
        raid-10-is-a-stripe-of-mirrors-raid-1-raid-0-each-set-of-drives-is-mirrored-and-striped-together-so-that-each-drive-in-the-set-is-fault-tolerant-within-the-group:
          RAID 10 ist ein Streifen von Spiegeln (RAID 1 + RAID 0). Jeder Satz
          von Laufwerken wird gespiegelt und zusammen gestreift, sodass jedes
          Laufwerk im Satz innerhalb der Gruppe fehlertolerant ist.
        3-drive-failures: 3 Laufwerksausfälle
        raid-7-requires-at-least-5-disks: RAID 7 erfordert mindestens 5 Festplatten
        raid-7-raid-tp-non-standard-is-similiar-to-raid-5-and-raid-6-but-with-a-third-parity-block-this-allows-for-a-third-disk-failure-at-the-cost-of-storage-reduction-equal-to-three-drives:
          RAID 7/RAID TP (nicht standardmäßig) ähnelt RAID 5 und RAID 6, verfügt
          jedoch über einen dritten Paritätsblock. Dies ermöglicht den Ausfall
          einer dritten Festplatte, allerdings auf Kosten einer
          Speicherreduzierung von drei Laufwerken.
        2-drive-failures: 2 Laufwerksausfälle
        raid-6-requires-at-least-4-disks: RAID 6 erfordert mindestens 4 Festplatten
        raid-6-is-similiar-to-raid-5-but-with-an-additional-parity-block-this-allows-for-an-additional-disk-failure-at-the-cost-of-storage-reduction-equal-to-two-drives:
          RAID 6 ähnelt RAID 5, verfügt jedoch über einen zusätzlichen
          Paritätsblock. Dies ermöglicht einen zusätzlichen Festplattenausfall
          auf Kosten einer Speicherreduzierung von zwei Laufwerken.
        1-drive-failure: 1 Laufwerksfehler
        raid-5-requires-at-least-3-disks: RAID 5 erfordert mindestens 3 Festplatten
        raid-5-uses-block-level-striping-with-parity-this-allows-for-fault-tolerance-with-a-storage-reduction-equal-to-one-drive-for-the-parity-information:
          RAID 5 verwendet Block-Level-Striping mit Parität. Dies ermöglicht
          Fehlertoleranz mit einer Speicherreduzierung von einem Laufwerk für
          die Paritätsinformationen.
        raid-1-requires-at-least-1-disk: RAID 1 erfordert mindestens 1 Festplatte
        raid-1-consists-of-an-exact-copy-of-the-data-mirror-across-two-or-more-disks-the-array-will-operate-as-long-as-at-least-one-drive-is-operational:
          RAID 1 besteht aus einer exakten Kopie der Daten (Spiegelung) auf zwei
          oder mehr Festplatten. Das Array funktioniert, solange mindestens eine
          Festplatte betriebsbereit ist.
        raid-0-requires-at-least-1-disk: RAID 0 erfordert mindestens 1 Festplatte
        raid-0-splits-data-evenly-across-2-or-more-disks-without-redunancy-or-fault-tolerance-creating-one-large-storage-space:
          RAID 0 verteilt Daten gleichmäßig auf zwei oder mehr Festplatten ohne
          Redunanz oder Fehlertoleranz und schafft so einen großen
          Speicherplatz.
