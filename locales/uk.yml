      tag-key-terms-explained: 🧠 Пояснення ключових термінів
      tag-raid-level: Рівень RAID
      tag-raid-redundant-array-of-independent-disks-is-a-method-of-combining-multiple-physical-drives-into-one-logical-unit-to-improve-performance-redundancy-or-both:
        RAID (надмірний масив незалежних дисків) – це метод об&#39;єднання
        кількох фізичних дисків в один логічний блок для покращення
        продуктивності, резервування або того й іншого.
      tag-description: Опис
      tag-raid-0: RAID 0
      tag-striping-only-no-redundancy-fast-but-risky-if-one-drive-fails-all-data-is-lost:
        Тільки чергування. Без резервування. Швидко, але ризиковано — якщо один
        диск вийде з ладу, всі дані будуть втрачені.
      tag-raid-1: RAID 1
      tag-mirroring-data-is-duplicated-across-drives-high-redundancy-low-capacity-efficiency:
        Дзеркальне відображення. Дані дублюються на всіх дисках. Висока
        резервування, низька ефективність використання ємності.
      tag-raid-5: RAID 5
      tag-striping-with-parity-can-tolerate-one-drive-failure-balanced-speed-and-redundancy:
        Чергування з контролем парності. Може переносити відмову одного диска.
        Збалансована швидкість та резервування.
      tag-raid-6: RAID 6
      tag-double-parity-can-survive-two-drive-failures: Подвійна парність. Може витримати два збої диска.
      tag-raid-10: RAID 10
      tag-mirrored-pairs-striped-together-high-performance-and-redundancy:
        Дзеркальні пари, з&#39;єднані разом. Висока продуктивність та
        резервування.
      tag-raid-z1-z2-z3: RAID-Z1/Z2/Z3
      tag-zfs-based-raid-levels-with-single-double-or-triple-parity-designed-for-data-integrity:
        RAID-масиви на базі ZFS з одинарною, подвійною або потрійною парністю.
        Розроблені для забезпечення цілісності даних.
      tag-raid-50: RAID 50
      tag-stripe-of-raid-5-arrays-combines-performance-of-raid-0-with-redundancy-of-raid-5:
        Смуга масивів RAID 5. Поєднує продуктивність RAID 0 з резервуванням RAID
        5.
      tag-️-mtbf-mean-time-between-failures: ⏱️ MTBF (середній час між відмовами)
      tag-the-average-time-in-hours-a-drive-is-expected-to-operate-before-failing-higher-mtbf-means-more-reliable-hardware:
        Середній час (у годинах), протягом якого накопичувач має працювати до
        виходу з ладу. Більший час напрацювання на відмову означає надійніше
        обладнання.
      tag-rebuild-time: 🔁 Час відновлення
      tag-the-time-required-to-reconstruct-data-on-a-replacement-drive-after-a-failure-longer-rebuild-times-increase-the-risk-of-a-second-failure-during-recovery:
        Час, необхідний для відновлення даних на заміненому диску після збою.
        Довший час відновлення збільшує ризик повторного збою під час
        відновлення.
      tag-mttdl-mean-time-to-data-loss: 📉 MTTDL (середній час до втрати даних)
      tag-a-statistical-estimate-of-how-long-a-raid-system-can-operate-before-data-loss-occurs-it-considers-drive-failures-rebuild-time-and-raid-redundancy-higher-mttdl-means-a-safer-system:
        Статистична оцінка того, як довго RAID-система може працювати до втрати
        даних. Вона враховує збої дисків, час відновлення та резервування RAID.
        Вищий показник MTTDL означає безпечнішу систему.
      tag-bit-error-rate-ber: 🧮 Коефіцієнт бітових помилок (BER)
      tag-the-probability-that-a-bit-read-from-a-disk-will-be-incorrect-due-to-hardware-limitations-even-tiny-bers-like-1-in-a-trillion-can-cause-issues-during-rebuilds-especially-with-large-drives:
        Ймовірність того, що біт, зчитаний з диска, буде неправильним через
        обмеження обладнання. Навіть крихітні BER (наприклад, 1 на трильйон)
        можуть спричинити проблеми під час перебудови, особливо з великими
        дисками.
      tag-unrecoverable-read-error-ure: 🧠 Невиправна помилка читання (URE)
      tag-occurs-when-a-drive-fails-to-read-a-sector-during-rebuild-ber-contributes-to-ure-risk-which-can-compromise-raid-recovery:
        Виникає, коли диск не може прочитати сектор під час перебудови. BER
        сприяє ризику URE, що може поставити під загрозу відновлення RAID.
      tag-drive-capacity-tb: 📦 Ємність диска (ТБ)
      tag-total-storage-per-drive-larger-drives-take-longer-to-rebuild-and-are-more-susceptible-to-ber-related-errors:
        Загальний обсяг пам&#39;яті на диск. Більші диски потребують більше часу
        для відновлення та більш схильні до помилок, пов&#39;язаних з BER.
      tag-failure-probability: 📈 Ймовірність невдачі
      tag-the-chance-that-the-raid-system-will-experience-data-loss-over-a-given-time-period-e-g-5-years-calculated-using-mttdl-and-exponential-failure-models:
        Ймовірність втрати даних у системі RAID протягом заданого періоду часу
        (наприклад, 5 років). Розраховується за допомогою моделей MTTDL та
        експоненціальних відмов.
