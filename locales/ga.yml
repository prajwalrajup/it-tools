      tag-raid-level: Leibhéal RAID
      tag-raid-redundant-array-of-independent-disks-is-a-method-of-combining-multiple-physical-drives-into-one-logical-unit-to-improve-performance-redundancy-or-both:
        Is modh é RAID (Eagar Iomarcach Dioscaí Neamhspleácha) chun
        ilthiomántáin fhisiciúla a chomhcheangal in aonad loighciúil amháin chun
        feidhmíocht, iomarcaíocht, nó an dá rud a fheabhsú.
      tag-description: Cur síos
