  content-fork: >
    # Über IT-Tools

    Diese wunderbare Website, ursprünglich mit ❤ von [Corentin
    Thomasset](https://corentin.tech?utm_source=it-tools&utm_medium=about)
    erstellt und durch ShareVB erweitert, bietet nützliche Tools für Entwickler
    und IT-Beschäftigte. Wenn Sie sie nützlich finden, teilen Sie sie gerne mit
    anderen, die sie Ihrer Meinung nach ebenfalls nützlich finden könnten, und
    vergessen Sie nicht, sie in Ihrer Shortcut-Leiste zu speichern!

    IT-Tools ist Open Source (unter der GPL-3.0-Lizenz) und kostenlos und wird
    es auch immer bleiben. Wenn Sie meine Arbeit an diesem Fork unterstützen und
    mich ermutigen möchten, weitere Tools und Funktionen hinzuzufügen,
    unterstützen Sie mich bitte durch ein
    [Sponsoring](https://www.buymeacoffee.com/sharevb).

    ## Technologien

    IT-Tools wird in Vue.js (Vue 3) mit der Naive UI-Komponentenbibliothek
    erstellt und von Vercel gehostet und kontinuierlich bereitgestellt. Einige
    Tools verwenden Open-Source-Bibliotheken von Drittanbietern. Die
    vollständige Liste finden Sie in der Datei
    [package.json](https://github.com/sharevb/it-tools/blob/main/package.json)
    des Repositorys.

    ## Fehler gefunden? Fehlt ein Tool?

    Wenn Sie ein Tool benötigen, das hier derzeit nicht vorhanden ist und Ihrer
    Meinung nach nützlich sein könnte, können Sie gerne einen Funktionsantrag im
    Abschnitt [Probleme](https://github.com/sharevb/it-tools/issues/new/choose)
    des GitHub-Repositorys einreichen.

    Und wenn Sie einen Fehler gefunden haben oder etwas nicht wie erwartet
    funktioniert, reichen Sie bitte einen Fehlerbericht im Abschnitt
    [Probleme](https://github.com/sharevb/it-tools/issues/new/choose) des
    GitHub-Repositorys ein.
