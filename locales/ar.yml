      label-failure-probability: "احتمال الفشل:"
      tag-key-terms-explained: 🧠 شرح المصطلحات الرئيسية
      tag-raid-level: مستوى RAID
      tag-raid-redundant-array-of-independent-disks-is-a-method-of-combining-multiple-physical-drives-into-one-logical-unit-to-improve-performance-redundancy-or-both:
        RAID (مجموعة مكررة من الأقراص المستقلة) هي طريقة لدمج محركات أقراص مادية
        متعددة في وحدة منطقية واحدة لتحسين الأداء أو التكرار أو كليهما.
      tag-description: وصف
      tag-raid-0: RAID 0
      tag-striping-only-no-redundancy-fast-but-risky-if-one-drive-fails-all-data-is-lost:
        تقسيم البيانات فقط. لا يوجد تكرار. سريع ولكنه محفوف بالمخاطر - في حال
        تعطل أحد محركات الأقراص، تُفقد جميع البيانات.
      tag-raid-1: RAID 1
      tag-mirroring-data-is-duplicated-across-drives-high-redundancy-low-capacity-efficiency:
        النسخ المتطابق. يتم تكرار البيانات على محركات الأقراص. تكرار عالي،
        وكفاءة منخفضة في السعة.
      tag-raid-5: RAID 5
      tag-striping-with-parity-can-tolerate-one-drive-failure-balanced-speed-and-redundancy:
        توزيع البيانات مع التكافؤ. يتحمل فشل محرك أقراص واحد. سرعة وتكرار
        متوازنان.
      tag-raid-6: RAID 6
      tag-double-parity-can-survive-two-drive-failures: تكافؤ مزدوج. يمكنه تحمل فشل محركين.
      tag-raid-10: RAID 10
      tag-mirrored-pairs-striped-together-high-performance-and-redundancy: أزواج متطابقة مُخطَّطة. أداء عالٍ وتكرار.
      tag-raid-z1-z2-z3: RAID-Z1/Z2/Z3
      tag-zfs-based-raid-levels-with-single-double-or-triple-parity-designed-for-data-integrity:
        مستويات RAID مبنية على نظام ZFS، بتكافؤ فردي أو مزدوج أو ثلاثي. مصممة
        لضمان سلامة البيانات.
      tag-raid-50: RAID 50
      tag-stripe-of-raid-5-arrays-combines-performance-of-raid-0-with-redundancy-of-raid-5: شريط من مصفوفات RAID 5. يجمع بين أداء RAID 0 وتكرار RAID 5.
      tag-️-mtbf-mean-time-between-failures: ⏱️ متوسط الوقت بين الأعطال (MTBF)
      tag-the-average-time-in-hours-a-drive-is-expected-to-operate-before-failing-higher-mtbf-means-more-reliable-hardware:
        متوسط الوقت المتوقع لتشغيل محرك الأقراص (بالساعات) قبل تعطله. متوسط
        الوقت بين الأعطال الأعلى يعني موثوقية أعلى للأجهزة.
      tag-rebuild-time: 🔁 وقت إعادة البناء
      tag-the-time-required-to-reconstruct-data-on-a-replacement-drive-after-a-failure-longer-rebuild-times-increase-the-risk-of-a-second-failure-during-recovery:
        الوقت اللازم لإعادة بناء البيانات على محرك أقراص بديل بعد عطل. إطالة مدة
        إعادة البناء تزيد من خطر حدوث عطل ثانٍ أثناء الاسترداد.
      tag-mttdl-mean-time-to-data-loss: 📉 MTTDL (متوسط الوقت المستغرق لفقدان البيانات)
      tag-a-statistical-estimate-of-how-long-a-raid-system-can-operate-before-data-loss-occurs-it-considers-drive-failures-rebuild-time-and-raid-redundancy-higher-mttdl-means-a-safer-system:
        تقدير إحصائي لمدة تشغيل نظام RAID قبل فقدان البيانات. يأخذ هذا التقدير
        في الاعتبار أعطال محركات الأقراص، ووقت إعادة البناء، وتكرار RAID. يعني
        ارتفاع مدة MTTDL نظامًا أكثر أمانًا.
      tag-bit-error-rate-ber: معدل خطأ البت (BER)
      tag-the-probability-that-a-bit-read-from-a-disk-will-be-incorrect-due-to-hardware-limitations-even-tiny-bers-like-1-in-a-trillion-can-cause-issues-during-rebuilds-especially-with-large-drives:
        احتمالية أن تكون قراءة البت من القرص غير صحيحة بسبب قيود الأجهزة. حتى
        أخطاء البت الصغيرة (مثل 1 من كل تريليون) قد تُسبب مشاكل أثناء إعادة
        البناء، خاصةً مع محركات الأقراص الكبيرة.
      tag-unrecoverable-read-error-ure: 🧠 خطأ قراءة غير قابل للاسترداد (URE)
      tag-occurs-when-a-drive-fails-to-read-a-sector-during-rebuild-ber-contributes-to-ure-risk-which-can-compromise-raid-recovery:
        يحدث هذا عندما يفشل محرك الأقراص في قراءة قطاع أثناء إعادة البناء. يساهم
        BER في خطر URE، مما قد يعرض استرداد RAID للخطر.
      tag-drive-capacity-tb: 📦 سعة محرك الأقراص (تيرابايت)
      tag-total-storage-per-drive-larger-drives-take-longer-to-rebuild-and-are-more-susceptible-to-ber-related-errors:
        إجمالي مساحة التخزين لكل محرك أقراص. تستغرق محركات الأقراص الأكبر حجمًا
        وقتًا أطول لإعادة بنائها، وهي أكثر عرضة للأخطاء المتعلقة بـ BER.
      tag-failure-probability: 📈 احتمال الفشل
      tag-the-chance-that-the-raid-system-will-experience-data-loss-over-a-given-time-period-e-g-5-years-calculated-using-mttdl-and-exponential-failure-models:
        احتمالية فقدان بيانات نظام RAID خلال فترة زمنية محددة (مثلاً، خمس
        سنوات). حُسبت باستخدام نموذجي MTTDL والفشل الأسّي.
