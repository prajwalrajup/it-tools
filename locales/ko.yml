    PomodoroAbout:
      text:
        source-wikipedia: "출처: 위키피디아"
        once-the-long-break-is-finished-return-to-step-1: 긴 휴식이 끝나면 1단계로 돌아가세요.
        keep-repeating-steps-1-3-but-after-your-4th-task-take-a-long-break-instead-of-a-short-break-20-30-minutes-is-common: 1~3단계를 계속 반복하지만, 4번째 작업을 마친 후에는 짧은 휴식 대신 긴 휴식을 취하세요(일반적으로 20~30분).
        when-the-timer-rings-take-a-short-break-5-10-minutes-is-common: 타이머가 울리면 짧은 휴식을 취하세요(일반적으로 5~10분).
        work-on-the-task-during-that-time: 그 시간 동안 작업을 진행하세요.
        decide-on-a-task-and-set-the-timer-25-minutes-is-common: 작업을 결정하고 타이머를 설정합니다(일반적으로 25분).
        five-steps-of-the-pomodoro-technique: 포모도로 테크닉의 5단계
        the-pomodoro-technique-is-a-time-management-method-developed-by-francesco-cirillo-in-the-1980s-it-uses-a-timer-to-break-work-into-intervals-typically-25-minutes-in-length-separated-by-short-breaks-each-interval-is-known-as-a-pomodoro-from-the-italian-word-for-tomato-after-the-tomato-shaped-kitchen-timer-cirillo-used-as-a-university-student:
          포모도로 기법은 프란체스코 치릴로가 1980년대에 개발한 시간 관리 방법입니다. 타이머를 사용하여 작업을 보통 25분 길이의
          간격으로 나누고, 그 사이에 짧은 휴식 시간을 둡니다. 각 간격은 시릴로가 대학생 시절 사용했던 토마토 모양의 주방 타이머에서
