  pomodoro-timer:
    title: Đồng hồ bấm giờ Pomodoro
    description: Bộ đếm thời gian Pomodoro cơ bản
    texts:
      tag-import-pomodoroapp-from-app-pomodoroapp-vue: nhập PomodoroApp từ &#39;./app/PomodoroApp.vue&#39;;
    SplashScreen:
      text:
        pomodoro-timer-0: Đồng hồ bấm giờ Pomodoro
        loading-0: Đang tải...
    PomodoroAbout:
      text:
        source-wikipedia: "Nguồn: Wikipedia"
        once-the-long-break-is-finished-return-to-step-1: Sau khi kỳ nghỉ dài kết thúc, hãy quay lại Bước 1.
        keep-repeating-steps-1-3-but-after-your-4th-task-take-a-long-break-instead-of-a-short-break-20-30-minutes-is-common:
          Tiếp tục lặp lại các Bước 1-3, nhưng sau nhiệm vụ thứ 4, hãy nghỉ ngơi
          dài thay vì nghỉ ngơi ngắn (thường là 20-30 phút).
        when-the-timer-rings-take-a-short-break-5-10-minutes-is-common: Khi chuông báo giờ reo, hãy nghỉ ngơi một chút (thường là 5-10 phút).
        work-on-the-task-during-that-time: Làm việc trong thời gian đó.
        decide-on-a-task-and-set-the-timer-25-minutes-is-common: Quyết định một nhiệm vụ
          và đặt thời gian (thời gian thông thường là 25 phút).
        five-steps-of-the-pomodoro-technique: Năm bước của Kỹ thuật Pomodoro
        the-pomodoro-technique-is-a-time-management-method-developed-by-francesco-cirillo-in-the-1980s-it-uses-a-timer-to-break-work-into-intervals-typically-25-minutes-in-length-separated-by-short-breaks-each-interval-is-known-as-a-pomodoro-from-the-italian-word-for-tomato-after-the-tomato-shaped-kitchen-timer-cirillo-used-as-a-university-student:
          Kỹ thuật Pomodoro là một phương pháp quản lý thời gian được Francesco
          Cirillo phát triển vào những năm 1980. Phương pháp này sử dụng bộ đếm
          thời gian để chia nhỏ công việc thành các khoảng thời gian, thường kéo
          dài 25 phút, được phân cách bằng các khoảng nghỉ ngắn. Mỗi khoảng nghỉ
          được gọi là pomodoro, bắt nguồn từ tiếng Ý có nghĩa là cà chua, theo
          tên chiếc đồng hồ bấm giờ hình quả cà chua mà Cirillo sử dụng khi còn
          là sinh viên đại học.
        the-pomodoro-technique: Kỹ thuật Pomodoro
