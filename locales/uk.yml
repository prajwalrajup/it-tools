    PomodoroAbout:
      text:
        source-wikipedia: "Джерело: Вікіпедія"
        once-the-long-break-is-finished-return-to-step-1: Після завершення тривалої перерви поверніться до кроку 1.
        keep-repeating-steps-1-3-but-after-your-4th-task-take-a-long-break-instead-of-a-short-break-20-30-minutes-is-common:
          Продовжуйте повторювати кроки 1-3, але після 4-го завдання зробіть
          довгу перерву замість короткої (зазвичай це 20-30 хвилин).
        when-the-timer-rings-take-a-short-break-5-10-minutes-is-common: Коли задзвонить таймер, зробіть коротку перерву (зазвичай 5-10 хвилин).
        work-on-the-task-during-that-time: Працюйте над завданням протягом цього часу.
        decide-on-a-task-and-set-the-timer-25-minutes-is-common: Визначтеся із завданням і встановіть таймер (зазвичай 25 хвилин).
        five-steps-of-the-pomodoro-technique: П&#39;ять кроків техніки Помідоро
        the-pomodoro-technique-is-a-time-management-method-developed-by-francesco-cirillo-in-the-1980s-it-uses-a-timer-to-break-work-into-intervals-typically-25-minutes-in-length-separated-by-short-breaks-each-interval-is-known-as-a-pomodoro-from-the-italian-word-for-tomato-after-the-tomato-shaped-kitchen-timer-cirillo-used-as-a-university-student:
          Техніка помідора — це метод управління часом, розроблений Франческо
          Чірілло у 1980-х роках. Вона використовує таймер для розбиття роботи
          на інтервали, зазвичай тривалістю 25 хвилин, розділені короткими
          перервами. Кожен інтервал відомий як помідор, від італійського слова
          «помідор», на честь кухонного таймера у формі помідора, який Чірілло
          використовував, коли був студентом університету.
